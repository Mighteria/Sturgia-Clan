<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sturgia | Northern Kings</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #3498db;
            --bg: #05070a;
            --glass: rgba(10, 12, 16, 0.8);
            --border: rgba(255, 255, 255, 0.05);
            --text: #e0e6ed;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(52, 152, 219, 0.15), transparent),
                url('https://images.alphacoders.com/100/1005370.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        /* Estetik Navigasyon */
        nav {
            background: var(--glass);
            height: 80px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container { max-width: 1200px; margin: 0 auto; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        
        .nav-links a {
            color: #8892b0; text-decoration: none; margin-right: 25px; font-weight: 500; 
            font-size: 0.9rem; letter-spacing: 1px; transition: 0.4s; cursor: pointer;
        }
        .nav-links a:hover { color: var(--accent); text-shadow: 0 0 15px rgba(52, 152, 219, 0.4); }

        /* Modern Hero Alanı */
        .hero { height: 320px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hero h1 { 
            font-family: 'Space+Grotesk', sans-serif; font-weight: 900; font-size: 4rem; 
            letter-spacing: -2px; background: linear-gradient(to bottom, #fff, #636e72);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .wrapper { max-width: 1200px; margin: 0 auto 100px; display: grid; grid-template-columns: 1fr 320px; gap: 40px; padding: 0 20px; }

        /* Kart Tasarımları */
        .card {
            background: var(--glass); border: 1px solid var(--border); border-radius: 16px; padding: 32px; 
            margin-bottom: 24px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }
        .card-header { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
        .card-header::before { content: ''; width: 4px; height: 18px; background: var(--accent); border-radius: 10px; }

        /* Rütbe Etiketleri */
        .role-tag { padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
        
        /* Butonlar */
        .btn { 
            padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; 
            font-size: 0.85rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .btn-blue { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3); }
        .btn-blue:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4); }

        /* Liste Öğeleri */
        .user-item { 
            display: flex; justify-content: space-between; align-items: center; padding: 16px; 
            background: rgba(255,255,255,0.02); margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border);
        }

        /* Modal Tasarımı */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #0d1117; padding: 40px; width: 380px; border-radius: 24px; border: 1px solid var(--border); }
        .modal-content input { 
            width: 100%; padding: 14px; margin: 12px 0; background: #161b22; 
            border: 1px solid var(--border); color: white; border-radius: 10px; outline: none;
        }
        .modal-content input:focus { border-color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tab-content { display: none; animation: fadeIn 0.6s ease; }
        .active-tab { display: block; }
    </style>
</head>
<body>

<nav>
    <div class="nav-container">
        <div class="nav-links">
            <a onclick="showTab('home')">ANASAYFA</a>
            <a onclick="showTab('warriors')">SAVAŞÇILAR</a>
        </div>
        <div id="auth-links">
            <button class="btn btn-blue" onclick="openModal('login')">GİRİŞ YAP</button>
        </div>
        <div id="profile-links" style="display:none; align-items: center;">
            <span id="display-name" onclick="openModal('pass')" style="cursor:pointer; font-weight:700; color:var(--accent); font-family: 'Space Grotesk';"></span>
            <button class="btn" onclick="logout()" style="color:#ff4757; background:transparent; font-size:12px; margin-left:10px;">ÇIK</button>
        </div>
    </div>
</nav>

<div class="hero">
    <h1>STURGIA</h1>
    <p style="color:#8892b0; letter-spacing:3px; font-size: 0.8rem;">NORTHERN KINGS</p>
</div>

<div class="wrapper">
    <div class="main">
        <div id="home" class="tab-content active-tab">
            <div class="card">
                <div class="card-header">Klan Ruhu</div>
                <p style="line-height: 1.6; color: #8892b0;">Sturgia, sadece bir klan değil; sadakat ve onur üzerine kurulmuş bir kardeşliktir. Ş, Ç, Ö, Ğ harfleri artık burada özgürce yaşar.</p>
            </div>
            
            <div id="adm-panel" class="card" style="display:none;">
                <div class="card-header" style="color:var(--accent);">Yönetim Merkezi</div>
                <div id="management-list"></div>
            </div>
        </div>

        <div id="warriors" class="tab-content">
            <div class="card">
                <div class="card-header">Savaşçı Listesi</div>
                <div id="list-container"></div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="card" style="text-align: center;">
            <div class="card-header" style="justify-content:center; border:none;">ORDU GÜCÜ</div>
            <div id="army-count" style="font-size: 3.5rem; font-family: 'Space Grotesk'; font-weight: 300;">0</div>
        </div>
    </div>
</div>

<div id="authModal" class="modal">
    <div class="modal-content">
        <h2 id="m-title" style="margin-bottom:20px; font-family:'Space Grotesk';">Giriş</h2>
        <input type="text" id="m-nick" placeholder="Savaşçı Adı">
        <input type="password" id="m-pass" placeholder="Şifre">
        <div style="margin: 10px 0; font-size: 0.8rem; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="m-remember" style="width:auto; margin:0;"> Beni Hatırla
        </div>
        <button class="btn btn-blue" id="m-action-btn" style="width:100%; margin-top:10px;">DEVAM ET</button>
        <p onclick="closeModals()" style="text-align:center; color:#8892b0; margin-top:20px; cursor:pointer; font-size:0.8rem;">Kapat</p>
    </div>
</div>

<div id="passModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom:20px; font-family:'Space Grotesk';">Şifre Güncelle</h2>
        <input type="password" id="new-pw" placeholder="Yeni Şifre">
        <button class="btn btn-blue" onclick="updatePw()" style="width:100%;">GÜNCELLE</button>
        <p onclick="closeModals()" style="text-align:center; color:#8892b0; margin-top:20px; cursor:pointer; font-size:0.8rem;">İptal</p>
    </div>
</div>

<script>
    // FIREBASE CONFIG (Burayı doldurmayı unutma kanka)
    const firebaseConfig = { apiKey: "...", authDomain: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "..." };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = null;

    const roleMap = {
        'admin': { label: '</> Yönetici', color: '#70a1ff' },
        'westra': { label: 'Westra / Abak 🌊', color: '#54a0ff' },
        'rehber_plus': { label: 'Sturgiyalı Rehber+', color: '#000080' },
        'ally': { label: 'Ally', color: '#ff00ff' },
        '216': { label: '216', color: '#74b9ff' },
        'asistan': { label: 'Sturgiyalı Asistan', color: '#8e44ad' },
        'rehber': { label: 'Sturgiyalı Rehber', color: '#27ae60' },
        'buyuk': { label: 'Büyük Sturgiyalı', color: '#c0392b' },
        'onemli': { label: 'Önemli Sturgiyalı', color: '#8e44ad' },
        'sturgiyali': { label: 'Sturgiyalı', color: '#3498db' }
    };

    window.onload = () => {
        const saved = localStorage.getItem('sturgia_session');
        if(saved) {
            const data = JSON.parse(saved);
            loginStep(data.nick, data.role, data.id);
        }
        loadWarriors();
    };

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.getElementById(id).classList.add('active-tab');
        if(id === 'warriors') loadWarriors();
    }

    async function doLogin() {
        const n = document.getElementById('m-nick').value, p = document.getElementById('m-pass').value, rem = document.getElementById('m-remember').checked;
        if(!n || !p) return;
        
        const snap = await db.collection("users").where("nick", "==", n).where("pass", "==", p).get();
        if(snap.empty) {
            // Kayıt yoksa oluştur
            const doc = await db.collection("users").add({ nick: n, pass: p, role: 'sturgiyali' });
            if(rem) saveSession(n, 'sturgiyali', doc.id);
            loginStep(n, 'sturgiyali', doc.id);
        } else {
            const d = snap.docs[0];
            if(rem) saveSession(d.data().nick, d.data().role, d.id);
            loginStep(d.data().nick, d.data().role, d.id);
        }
        closeModals();
    }

    function saveSession(nick, role, id) {
        localStorage.setItem('sturgia_session', JSON.stringify({nick, role, id}));
    }

    function loginStep(nick, role, id) {
        currentUser = {id, nick, role};
        document.getElementById('auth-links').style.display = 'none';
        document.getElementById('profile-links').style.display = 'flex';
        document.getElementById('display-name').innerText = nick;
        if(role === 'admin') {
            document.getElementById('adm-panel').style.display = 'block';
            loadAdminPanel();
        }
    }

    async function loadWarriors() {
        const snap = await db.collection("users").get();
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        snap.forEach(doc => {
            const u = doc.data();
            const r = roleMap[u.role] || roleMap['sturgiyali'];
            container.innerHTML += `
                <div class="user-item">
                    <span style="font-weight:700;">${u.nick}</span>
                    <span class="role-tag" style="color:${r.color}; border: 1px solid ${r.color}33; background:${r.color}11">${r.label}</span>
                </div>`;
        });
        document.getElementById('army-count').innerText = snap.size;
    }

    async function loadAdminPanel() {
        const list = document.getElementById('management-list');
        const snap = await db.collection("users").get();
        list.innerHTML = "";
        snap.forEach(doc => {
            const u = doc.data();
            list.innerHTML += `
                <div class="user-item">
                    <span>${u.nick}</span>
                    <select onchange="changeRole('${doc.id}', this.value)" style="background:#000; color:#fff; border:1px solid #333; padding:5px; border-radius:5px;">
                        ${Object.keys(roleMap).map(k => `<option value="${k}" ${u.role===k?'selected':''}>${roleMap[k].label}</option>`).join('')}
                    </select>
                </div>`;
        });
    }

    async function changeRole(id, newRole) {
        await db.collection("users").doc(id).update({role: newRole});
        loadWarriors();
    }

    async function updatePw() {
        const np = document.getElementById('new-pw').value;
        if(!np || !currentUser) return;
        await db.collection("users").doc(currentUser.id).update({pass: np});
        alert("Şifre başarıyla güncellendi kanka!");
        closeModals();
    }

    function openModal(type) {
        if(type === 'login') document.getElementById('authModal').style.display = 'flex';
        if(type === 'pass') document.getElementById('passModal').style.display = 'flex';
    }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    document.getElementById('m-action-btn').onclick = doLogin;
    function logout() { localStorage.removeItem('sturgia_session'); location.reload(); }
</script>
</body>
</html>
