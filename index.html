<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Sturgia | Clan Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
  :root {
    --bg: #04050d;
    --accent: #7dd3fc;
    --accent-glow: rgba(125, 211, 252, 0.4);
  }

  body, html {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--bg); overflow: hidden;
    font-family: 'Outfit', sans-serif;
  }

  /* Ana Tuval ve Arka Plan */
  #canvas-container { position: fixed; inset: 0; z-index: 1; }
  #vein-canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

  /* Merkez Logo (Kalp) */
  .center-container {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 100;
    display: flex; justify-content: center; align-items: center;
  }

  .sturgia-logo {
    width: 180px; height: 180px;
    object-fit: contain;
    filter: drop-shadow(0 0 30px var(--accent-glow));
    animation: heartbeat 1.5s ease-in-out infinite;
    cursor: pointer;
    transition: transform 0.3s ease;
  }

  @keyframes heartbeat {
    0% { transform: scale(1); filter: drop-shadow(0 0 20px var(--accent-glow)); }
    15% { transform: scale(1.12); filter: drop-shadow(0 0 40px var(--accent)); }
    30% { transform: scale(1); filter: drop-shadow(0 0 20px var(--accent-glow)); }
    45% { transform: scale(1.08); filter: drop-shadow(0 0 30px var(--accent-glow)); }
    100% { transform: scale(1); filter: drop-shadow(0 0 20px var(--accent-glow)); }
  }

  /* Basit Arayüz Elemanları */
  .ui-overlay {
    position: relative; z-index: 150; color: white;
    padding: 30px; pointer-events: none;
  }
  .ui-overlay h1 { font-family: 'Orbitron'; font-size: 2.5rem; letter-spacing: 5px; margin: 0; }
  .nav-hint { position: fixed; bottom: 30px; width: 100%; text-align: center; opacity: 0.6; font-size: 0.9rem; }
</style>
</head>
<body>

<div id="canvas-container"></div>
<canvas id="vein-canvas"></canvas>

<div class="center-container">
  <img src="https://www.image2url.com/r2/default/images/1777141392304-edb1d663-375b-457b-a4e5-03d14214baf7.jpg" alt="Sturgia Logo" class="sturgia-logo" id="main-heart">
</div>

<div class="ui-overlay">
  <h1>STURGIA</h1>
  <p>VANGUARD OF THE NORTH</p>
</div>

<div class="nav-hint">Minecraft ağacını keşfetmek için fareyi hareket ettir</div>

<script>
/**
 * 1. 3D MINECRAFT AĞACI SİSTEMİ (Three.js)
 */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('canvas-container').appendChild(renderer.domElement);

const loader = new THREE.TextureLoader();
// Minecraft dokuları (Temsili)
const woodTex = loader.load('https://vignette.wikia.nocookie.net/minecraft/images/3/30/Oak_Log_Side.png');
const leafTex = loader.load('https://vignette.wikia.nocookie.net/minecraft/images/b/b3/Oak_Leaves.png');

const blocks = [];
const mouse = new THREE.Vector3(0, 0, 0);
const raycaster = new THREE.Raycaster();
const mouse2D = new THREE.Vector2();

function createMinecraftTree() {
    const group = new THREE.Group();
    
    // Gövde (Trunk)
    for(let y = 0; y < 7; y++) {
        addBlock(0, y - 4, -5, woodTex, group);
    }
    // Yapraklar (Leaves)
    for(let x = -2; x <= 2; x++) {
        for(let y = 3; y <= 6; y++) {
            for(let z = -7; z <= -3; z++) {
                if(Math.random() > 0.2) addBlock(x, y-4, z, leafTex, group);
            }
        }
    }
    scene.add(group);
}

function addBlock(x, y, z, tex, group) {
    const geo = new THREE.BoxGeometry(1, 1, 1);
    const mat = new THREE.MeshLambertMaterial({ map: tex });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.userData.basePos = mesh.position.clone();
    blocks.push(mesh);
    group.add(mesh);
}

const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0x7dd3fc, 1);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

camera.position.z = 8;
createMinecraftTree();

/**
 * 2. ORGANİK DAMAR SİSTEMİ (2D Canvas)
 */
const canvas = document.getElementById('vein-canvas');
const ctx = canvas.getContext('2d');
let veins = [];

class VeinBranch {
    constructor(x, y, angle, depth) {
        this.pts = [{x, y}];
        this.angle = angle;
        this.depth = depth;
        this.finished = false;
        this.length = Math.random() * 80 + 50;
        this.branches = [];
    }

    grow() {
        if (this.pts.length > this.length) {
            if (this.depth < 3 && this.branches.length === 0) {
                this.branches.push(new VeinBranch(this.lastPt.x, this.lastPt.y, this.angle - 0.4, this.depth + 1));
                this.branches.push(new VeinBranch(this.lastPt.x, this.lastPt.y, this.angle + 0.4, this.depth + 1));
            }
            this.finished = true;
            return;
        }
        let last = this.lastPt;
        this.angle += (Math.random() - 0.5) * 0.2;
        let nx = last.x + Math.cos(this.angle) * 2;
        let ny = last.y + Math.sin(this.angle) * 2;
        this.pts.push({x: nx, y: ny});
    }

    get lastPt() { return this.pts[this.pts.length - 1]; }

    draw(alpha) {
        ctx.beginPath();
        ctx.moveTo(this.pts[0].x, this.pts[0].y);
        for(let p of this.pts) ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = `rgba(125, 211, 252, ${alpha * (1 / (this.depth + 1))})`;
        ctx.lineWidth = 3 / (this.depth + 1);
        ctx.stroke();
        this.branches.forEach(b => b.draw(alpha));
    }
}

function initVeins() {
    veins = [];
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;
    for(let i = 0; i < 8; i++) {
        veins.push(new VeinBranch(centerX, centerY, (Math.PI * 2 / 8) * i, 0));
    }
}

/**
 * 3. ANİMASYON DÖNGÜSÜ VE ETKİLEŞİM
 */
window.addEventListener('mousemove', (e) => {
    mouse2D.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse2D.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

function animate() {
    requestAnimationFrame(animate);
    
    // Minecraft Ağaç Etkileşimi
    raycaster.setFromCamera(mouse2D, camera);
    const intersects = raycaster.intersectObjects(blocks);
    
    blocks.forEach(block => {
        let target = block.userData.basePos.clone();
        if (intersects.length > 0) {
            const dist = block.position.distanceTo(intersects[0].point);
            if (dist < 2.5) {
                // Blokları birbirinden ayır
                let dir = block.position.clone().sub(intersects[0].point).normalize();
                target.add(dir.multiplyScalar(0.8));
            }
        }
        block.position.lerp(target, 0.05);
        block.rotation.y += 0.002; // Hafif süzülme
    });

    // Damar Çizimi
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    veins.forEach(v => {
        if(!v.finished) v.grow();
        v.draw(0.4);
    });

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initVeins();
});

// Başlat
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
initVeins();
animate();

</script>
</body>
</html>
