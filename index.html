<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sturgia Clan | Elite Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --black: #050608; --deep: #0b0d12; --panel: #0f1118; --card: #13161e;
            --border: rgba(255,255,255,0.06); --ice: #a8d8ea; --frost: #c9e8f4;
            --steel: #8096b0; --gold: #c9a84c;
        }

        body {
            background-color: var(--black); color: var(--steel);
            font-family: 'Rajdhani', sans-serif; margin: 0; overflow-x: hidden;
        }

        .cinzel { font-family: 'Cinzel', serif; }
        .text-ice { color: var(--ice); text-shadow: 0 0 15px rgba(168,216,234,0.3); }

        /* MOBİL UYUMLULUK FİKSLERİ */
        .sidebar {
            width: 260px; height: 100vh; position: fixed; left: 0; top: 0;
            background: var(--panel); border-right: 1px solid var(--border);
            z-index: 1000; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .main-content { margin-left: 260px; padding: 40px; min-height: 100vh; }

        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; }
        }

        /* Tasarımın Geri Kalanı (Senin Kodun) */
        .glass-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 24px; position: relative; overflow: hidden;
        }

        .sturgia-input {
            background: var(--deep); border: 1px solid var(--border);
            color: var(--frost); padding: 12px 16px; border-radius: 8px; width: 100%;
        }

        .sturgia-btn {
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a2a 100%);
            border: 1px solid var(--ice); color: var(--ice);
            padding: 12px 24px; border-radius: 8px; font-weight: 700;
            transition: 0.3s; cursor: pointer;
        }

        .sturgia-btn:hover { background: var(--ice); color: var(--black); box-shadow: 0 0 20px rgba(168,216,234,0.4); }
        
        .restricted { display: none !important; }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="p-4 text-center border-b border-border">
            <img src="https://i.ibb.co/3p3r3mH/image-16de68.jpg" class="w-20 h-20 rounded-circle mb-3 border border-ice p-1" alt="Logo">
            <h4 class="cinzel text-ice fw-bold mb-0">STURGIA</h4>
            <p class="small text-uppercase tracking-widest opacity-50">Kuzeyin Soğuk Nefesi</p>
        </div>
        <nav class="p-3">
            <a href="#" onclick="showPage('home')" class="nav-link py-3 px-4 text-frost"><i class="fas fa-home me-3"></i> Anasayfa</a>
            <a href="#" onclick="showPage('warriors')" class="nav-link py-3 px-4 text-frost"><i class="fas fa-shield-alt me-3"></i> Savaşçılar</a>
            
            <a href="#" onclick="showPage('gallery')" id="nav-gallery" class="nav-link py-3 px-4 text-frost restricted"><i class="fas fa-images me-3"></i> Galeri</a>
            <a href="#" onclick="showPage('settings')" class="nav-link py-3 px-4 text-frost"><i class="fas fa-cog me-3"></i> Ayarlar</a>
            
            <div id="admin-nav" class="restricted">
                <hr class="border-border">
                <a href="#" onclick="showPage('admin')" class="nav-link py-3 px-4 text-warning"><i class="fas fa-user-crown me-3"></i> Admin Paneli</a>
            </div>
        </nav>
        <div class="position-absolute bottom-0 w-100 p-4 border-t border-border">
            <div id="auth-ui">
                <button onclick="openModal()" class="sturgia-btn w-100">GİRİŞ YAP</button>
            </div>
            <div id="user-ui" class="d-none">
                <p id="nav-nick" class="text-ice fw-bold mb-1"></p>
                <button onclick="logout()" class="btn btn-link text-danger p-0 small">Çıkış Yap</button>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <section id="page-home" class="page-sec">
            <div class="glass-card mb-4 text-center py-5">
                <h1 class="cinzel text-ice display-4 fw-bold">HOŞ GELDİN SAVAŞÇI</h1>
                <p class="lead">Sturgia klanı, sadakat ve onur üzerine kurulu bir kardeşliktir.</p>
            </div>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="glass-card text-center">
                        <h6 class="text-uppercase small opacity-50">Ordu Gücü</h6>
                        <h2 id="total-count" class="cinzel text-ice display-5 mb-0">0</h2>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-gallery" class="page-sec d-none">
            <div class="glass-card">
                <h2 class="cinzel text-ice mb-4">KLAN ARŞİVİ</h2>
                <div class="mb-4">
                    <input type="text" id="photo-url" class="sturgia-input" placeholder="Fotoğraf Linki (URL)">
                    <button onclick="uploadPhoto()" class="sturgia-btn mt-3">ARŞİVE EKLE</button>
                </div>
                <div id="gallery-container" class="row g-3"></div>
            </div>
        </section>

        <section id="page-warriors" class="page-sec d-none">
            <div class="glass-card">
                <h3 class="cinzel text-ice mb-4">AKTİF SAVAŞÇILAR</h3>
                <div id="warrior-list" class="row g-3"></div>
            </div>
        </section>

        <section id="page-admin" class="page-sec d-none">
            <div class="glass-card">
                <h3 class="cinzel text-warning mb-4">KOMUTA MERKEZİ</h3>
                <div class="table-responsive">
                    <table class="table table-dark">
                        <thead><tr><th>Savaşçı</th><th>Onay</th><th>Rütbe</th><th>İşlem</th></tr></thead>
                        <tbody id="admin-table"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card border-ice">
                <div class="p-4">
                    <h2 class="cinzel text-ice mb-4 text-center">KLAN GİRİŞİ</h2>
                    <input type="text" id="l-nick" class="sturgia-input mb-3" placeholder="Savaşçı Adı">
                    <input type="password" id="l-pass" class="sturgia-input mb-4" placeholder="Şifre">
                    <button id="login-btn" onclick="handleAuth()" class="sturgia-btn w-100">DEVAM ET</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, getDocs, addDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKd2xNlNn9pi6foaLGix8MOSasqehoS_U",
            authDomain: "sturgia-clan.firebaseapp.com",
            projectId: "sturgia-clan",
            storageBucket: "sturgia-clan.firebasestorage.app",
            messagingSenderId: "257587521790",
            appId: "1:257587521790:web:59b1a1b38029d1564dddaf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let user = JSON.parse(localStorage.getItem('st_secure_v1')) || null;

        // GÜÇLÜ ŞİFRELEME (SHA-256)
        async function hash(str) {
            const buf = new TextEncoder().encode(str);
            const hash = await crypto.subtle.digest('SHA-256', buf);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // MOBİL GİRİŞ FİX (Tıklama ve Klavye Onayı)
        window.handleAuth = async () => {
            const n = document.getElementById('l-nick').value.trim();
            const p = document.getElementById('l-pass').value;
            if(!n || !p) return alert("Bilgileri gir kanka!");

            const hp = await hash(p);
            const q = query(collection(db, "users"), where("nick", "==", n));
            const snap = await getDocs(q);

            if(snap.empty) {
                const res = await addDoc(collection(db, "users"), { nick: n, pass: hp, role: 'sturgiyali', approved: false });
                user = { id: res.id, nick: n, role: 'sturgiyali', approved: false };
            } else {
                const d = snap.docs[0].data();
                if(d.pass !== hp) return alert("Şifre yanlış!");
                user = { id: snap.docs[0].id, ...d };
            }

            localStorage.setItem('st_secure_v1', JSON.stringify(user));
            location.reload();
        };

        // Realtime Veri ve Onay Sistemi
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('warrior-list');
            const table = document.getElementById('admin-table');
            const total = document.getElementById('total-count');
            list.innerHTML = ""; table.innerHTML = ""; total.innerText = snap.size;

            snap.forEach(s => {
                const d = s.data();
                list.innerHTML += `<div class="col-md-4"><div class="glass-card d-flex justify-content-between align-items-center"><b>${d.nick}</b> <span class="badge bg-dark border border-ice text-ice">${d.role}</span></div></div>`;
                
                if(user?.role === 'admin') {
                    table.innerHTML += `<tr><td>${d.nick}</td><td>${d.approved?'✅':'❌'}</td><td>${d.role}</td><td class="text-end">
                        <button onclick="approve('${s.id}', ${!d.approved})" class="btn btn-sm btn-outline-info">Onay Değiş</button>
                    </td></tr>`;
                }
            });
        });

        // Galeri Sistemi
        onSnapshot(collection(db, "photos"), (snap) => {
            const container = document.getElementById('gallery-container');
            container.innerHTML = "";
            snap.forEach(s => {
                container.innerHTML += `<div class="col-md-3"><img src="${s.data().url}" class="img-fluid rounded border border-border shadow"></div>`;
            });
        });

        window.uploadPhoto = async () => {
            const url = document.getElementById('photo-url').value;
            if(url) { await addDoc(collection(db, "photos"), { url, by: user.nick }); document.getElementById('photo-url').value = ""; }
        };

        window.approve = async (id, stat) => { await updateDoc(doc(db, "users", id), { approved: stat }); };
        window.showPage = (id) => { 
            document.querySelectorAll('.page-sec').forEach(s => s.classList.add('d-none')); 
            document.getElementById('page-'+id).classList.remove('d-none');
        };

        // OTURUM KONTROLÜ VE ERİŞİM KISITLARI
        if(user) {
            document.getElementById('auth-ui').classList.add('d-none');
            document.getElementById('user-ui').classList.remove('d-none');
            document.getElementById('nav-nick').innerText = user.nick;
            
            if(user.approved || user.role === 'admin') {
                document.getElementById('nav-gallery').classList.remove('restricted');
            }
            if(user.role === 'admin') document.getElementById('admin-nav').classList.remove('restricted');
        }

        window.openModal = () => new bootstrap.Modal('#loginModal').show();
        window.logout = () => { localStorage.removeItem('st_secure_v1'); location.reload(); };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
