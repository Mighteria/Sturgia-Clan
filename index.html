<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Sturgia Clan | Elite</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --bg:#04050d; --ice:#7dd3fc; --frost:#e0f2fe; --gold:#f59e0b;
  --text:#cbd5e1; --muted:#475569; --b1:rgba(255,255,255,.07);
  --sw:260px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif;
  overflow-x:hidden; min-height:100vh;
}

/* --- THREE.JS ARKAPLAN --- */
#bg-canvas{position:fixed; inset:0; z-index:0; pointer-events:none}

/* --- YAN MENÜ (SIDENAV) --- */
.sidenav{
  position:fixed; left:0; top:0; z-index:100; width:var(--sw); height:100vh;
  background:rgba(4,5,13,.85); backdrop-filter:blur(30px);
  border-right:1px solid var(--b1); display:flex; flex-direction:column;
}
.clan-brand{padding:30px 20px; text-align:center; border-bottom:1px solid var(--b1)}
.clan-name{
  font-family:'Orbitron',sans-serif; font-size:16px; font-weight:800;
  letter-spacing:4px; color:var(--ice); text-transform:uppercase;
}

.nav-link{
  display:flex; align-items:center; gap:12px; padding:12px 20px;
  color:var(--muted); text-decoration:none; font-size:13px;
  transition:.3s; cursor:pointer;
}
.nav-link:hover, .nav-link.active{color:var(--frost); background:rgba(125,211,252,.05)}

/* --- ANA İÇERİK --- */
.main-content{margin-left:var(--sw); position:relative; z-index:1; padding:40px}

/* --- HERO BÖLÜMÜ --- */
.hero{margin-bottom:50px}
.hero-title{
  font-family:'Orbitron',sans-serif; font-size:50px; color:#fff;
  letter-spacing:-1px; margin-bottom:10px;
}
.hero-title span{color:var(--ice)}

/* --- ESKİ KODDAKİ ÖZELLİKLER (STATS & ROLES) --- */
.grid-container{display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:20px}
.card{
  background:rgba(255,255,255,.03); border:1px solid var(--b1);
  padding:25px; border-radius:15px; backdrop-filter:blur(10px);
}
.card-title{font-size:11px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:15px}

/* ROL SİSTEMİ STİLİ */
.role-row{
  display:flex; justify-content:space-between; align-items:center;
  padding:10px; border-bottom:1px solid var(--b1);
}
.btn-del{color:#ef4444; background:none; border:none; cursor:pointer; font-size:11px}

input{
  width:100%; padding:10px; background:rgba(255,255,255,.05);
  border:1px solid var(--b1); color:#fff; border-radius:8px; margin-bottom:10px;
}
.btn-add{
  width:100%; padding:10px; background:var(--ice); color:#000;
  border:none; border-radius:8px; font-weight:700; cursor:pointer;
}

@media (max-width:768px){
  .sidenav{transform:translateX(-100%)}
  .main-content{margin-left:0}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="sidenav">
  <div class="clan-brand">
    <div class="clan-name">STURGIA</div>
    <div style="font-size:9px; color:var(--muted); margin-top:5px">EST. 2026</div>
  </div>
  <div style="padding:20px 0">
    <a class="nav-link active"><i class="fas fa-home"></i> ANA SAYFA</a>
    <a class="nav-link"><i class="fas fa-users"></i> ÜYELER</a>
    <a class="nav-link"><i class="fas fa-comments"></i> FORUM</a>
    <a class="nav-link"><i class="fas fa-images"></i> GALERİ</a>
    <a class="nav-link" style="color:var(--gold)"><i class="fas fa-crown"></i> YÖNETİM</a>
  </div>
</div>

<div class="main-content">
  <section class="hero">
    <h1 class="hero-title">STURGIA <span>CLAN</span></h1>
    <p style="color:var(--muted)">Klan yönetim paneline hoş geldin. Buradan her şeyi kontrol edebilirsin.</p>
  </section>

  <div class="grid-container">
    <div class="card">
      <div class="card-title">KLAN DURUMU</div>
      <div style="font-size:32px; font-weight:800; font-family:'Orbitron'">48 / 50</div>
      <div style="color:var(--ice); font-size:12px; margin-top:5px">Savaşçı Aktif</div>
    </div>

    <div class="card">
      <div class="card-title">ROL YÖNETİMİ</div>
      <input type="text" id="roleInput" placeholder="Rol adı giriniz...">
      <button class="btn-add" onclick="addRole()">EKLE</button>
      <div id="roleList" style="margin-top:20px"></div>
    </div>
  </div>
</div>

<script>
// --- THREE.JS ARKA PLAN (YILDIZLAR VE PARÇACIKLAR) ---
(function() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('bg-canvas'), alpha: true});
  renderer.setSize(window.innerWidth, window.innerHeight);

  const geometry = new THREE.BufferGeometry();
  const vertices = [];
  for (let i = 0; i < 6000; i++) {
    vertices.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
  }
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  const material = new THREE.PointsMaterial({color: 0x7dd3fc, size: 0.8, transparent: true, opacity: 0.6});
  const points = new THREE.Points(geometry, material);
  scene.add(points);
  camera.position.z = 1000;

  function animate() {
    requestAnimationFrame(animate);
    points.rotation.y += 0.0008;
    points.rotation.x += 0.0003;
    renderer.render(scene, camera);
  }
  animate();
})();

// --- ROL FONKSİYONLARI ---
function addRole() {
  const input = document.getElementById('roleInput');
  if(!input.value) return;
  let roles = JSON.parse(localStorage.getItem('roles') || '[]');
  roles.push(input.value);
  localStorage.setItem('roles', JSON.stringify(roles));
  input.value = "";
  renderRoles();
}

function deleteRole(index) {
  let roles = JSON.parse(localStorage.getItem('roles'));
  roles.splice(index, 1);
  localStorage.setItem('roles', JSON.stringify(roles));
  renderRoles();
}

function renderRoles() {
  const list = document.getElementById('roleList');
  let roles = JSON.parse(localStorage.getItem('roles') || '[]');
  list.innerHTML = roles.map((r, i) => `
    <div class="role-row">
      <span>${r}</span>
      <button class="btn-del" onclick="deleteRole(${i})">SİL</button>
    </div>
  `).join('');
}
document.addEventListener('DOMContentLoaded', renderRoles);
</script>

</body>
</html>
