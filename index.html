<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sturgia | Northern Kings</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --accent: #3498db; --bg: #05070a; --glass: rgba(13, 17, 23, 0.95); --border: rgba(255, 255, 255, 0.08); --text: #e6edf3; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        
        /* Arkaplan */
        .bg-overlay { position: fixed; inset: 0; background: radial-gradient(circle at 50% -20%, rgba(52,152,219,0.1), transparent), url('https://images.alphacoders.com/100/1005370.jpg'); background-size: cover; background-position: center; z-index: -1; opacity: 0.4; }

        /* Navigasyon */
        nav { background: var(--glass); height: 70px; display: flex; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .nav-inner { max-width: 1200px; margin: 0 auto; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .nav-links a { color: #8b949e; text-decoration: none; margin-right: 25px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        /* Hero & Logo */
        .hero { padding: 60px 20px; text-align: center; }
        .hero img { width: 160px; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(52,152,219,0.3)); }
        .hero h1 { font-family: 'Space Grotesk'; font-size: 3rem; letter-spacing: 4px; color: #fff; }

        /* Main Layout */
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 300px; gap: 30px; padding: 20px; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .card-title { font-family: 'Space Grotesk'; font-size: 1rem; color: #fff; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
        .card-title::before { content: ''; width: 3px; height: 15px; background: var(--accent); }

        /* User List Items */
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; transition: 0.2s; }
        .user-row:hover { border-color: var(--accent); background: rgba(52,152,219,0.05); }
        .role-badge { font-size: 0.65rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; border: 1px solid currentColor; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: #0d1117; padding: 40px; border-radius: 16px; border: 1px solid var(--border); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #010409; border: 1px solid var(--border); color: #fff; border-radius: 6px; }
        .btn { width: 100%; padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; background: var(--accent); color: #fff; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .tab-content { display: none; }
        .active-tab { display: block; }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <nav>
        <div class="nav-inner">
            <div class="nav-links">
                <a onclick="switchTab('home')">ANASAYFA</a>
                <a onclick="switchTab('list')">SAVAŞÇILAR</a>
            </div>
            <div id="auth-section">
                <button onclick="toggleModal('login', true)" style="background:transparent; color:var(--accent); border:1px solid var(--accent); padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:700;">GİRİŞ</button>
            </div>
            <div id="user-section" style="display:none;">
                <span id="user-name" style="color:var(--accent); font-weight:700; margin-right:15px; cursor:pointer;" onclick="toggleModal('pw', true)"></span>
                <button onclick="logout()" style="color:#f85149; background:transparent; border:none; cursor:pointer; font-weight:700;">ÇIKIŞ</button>
            </div>
        </div>
    </nav>

    <div class="hero">
        <img src="https://i.ibb.co/L8p6M5t/sturgia-logo-fix.png" alt="Sturgia Logo">
        <h1>STURGIA</h1>
        <p style="color:#8b949e; letter-spacing:3px; font-size:0.75rem; margin-top:10px;">KUZEYİN SOĞUK NEFESİ</p>
    </div>

    <div class="container">
        <div class="main-side">
            <div id="tab-home" class="tab-content active-tab">
                <div class="card">
                    <div class="card-title">Klan Duyurusu</div>
                    <p style="color:#8b949e; line-height:1.6;">Sturgia klanı, sadakat ve onur üzerine kurulu bir kardeşliktir. Kuzeyin sert topraklarında hep beraber savaşıyoruz.</p>
                </div>
                <div id="admin-tools" class="card" style="display:none;">
                    <div class="card-title" style="color:#70a1ff;">Yönetim Paneli</div>
                    <div id="admin-user-list"></div>
                </div>
            </div>
            <div id="tab-list" class="tab-content">
                <div class="card">
                    <div class="card-title">Aktif Savaşçılar</div>
                    <div id="main-user-list"></div>
                </div>
            </div>
        </div>
        <div class="sidebar">
            <div class="card" style="text-align:center;">
                <div class="card-title" style="justify-content:center; border:none;">ORDU GÜCÜ</div>
                <div id="army-count" style="font-size:3.5rem; font-family:'Space Grotesk';">0</div>
            </div>
        </div>
    </div>

    <div id="login-modal" class="modal">
        <div class="modal-box">
            <h2 style="margin-bottom:20px;">Klan Girişi</h2>
            <input type="text" id="log-nick" placeholder="Savaşçı Adı">
            <input type="password" id="log-pass" placeholder="Şifre">
            <label style="font-size:0.8rem; color:#8b949e;"><input type="checkbox" id="log-rem"> Beni Hatırla</label>
            <button class="btn" style="margin-top:20px;" onclick="handleAuth()">DEVAM ET</button>
            <p onclick="toggleModal('login', false)" style="text-align:center; margin-top:15px; font-size:0.8rem; cursor:pointer; color:gray;">Kapat</p>
        </div>
    </div>

    <div id="pw-modal" class="modal">
        <div class="modal-box">
            <h2 style="margin-bottom:20px;">Şifre Değiştir</h2>
            <input type="password" id="new-pw" placeholder="Yeni Şifre">
            <button class="btn" onclick="updatePassword()">GÜNCELLE</button>
            <p onclick="toggleModal('pw', false)" style="text-align:center; margin-top:15px; font-size:0.8rem; cursor:pointer; color:gray;">İptal</p>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG - Burayı kendi bilgilerinle doldur kanka!
        const firebaseConfig = { apiKey: "...", authDomain: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "..." };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let me = null;
        const roles = {
            'admin': { n: '</> Yönetici', c: '#70a1ff' },
            'westra': { n: 'Westra / Abak 🌊', c: '#54a0ff' },
            'rehber_plus': { n: 'Sturgiyalı Rehber+', c: '#000080' },
            'ally': { n: 'Ally', c: '#ff00ff' },
            '216': { n: '216', c: '#74b9ff' },
            'asistan': { n: 'Sturgiyalı Asistan', c: '#8e44ad' },
            'rehber': { n: 'Sturgiyalı Rehber', c: '#27ae60' },
            'buyuk': { n: 'Büyük Sturgiyalı', c: '#c0392b' },
            'onemli': { n: 'Önemli Sturgiyalı', c: '#8e44ad' },
            'sturgiyali': { n: 'Sturgiyalı', c: '#3498db' }
        };

        // CANLI VERİ TAKİBİ (Snapshot) - Liste asla silinmez
        db.collection("users").onSnapshot(snap => {
            const list = document.getElementById('main-user-list');
            const admList = document.getElementById('admin-user-list');
            const count = document.getElementById('army-count');
            
            list.innerHTML = "";
            if(admList) admList.innerHTML = "";
            count.innerText = snap.size;

            snap.forEach(doc => {
                const u = doc.data();
                const r = roles[u.role] || roles['sturgiyali'];
                
                // Normal Liste
                list.innerHTML += `<div class="user-row"><strong>${u.nick}</strong><span class="role-badge" style="color:${r.c}">${r.n}</span></div>`;
                
                // Admin Paneli (Sadece adminlere özel)
                if(me && me.role === 'admin' && admList) {
                    admList.innerHTML += `<div class="user-row"><span>${u.nick}</span><select onchange="setRole('${doc.id}', this.value)" style="background:#000; color:#fff; border:1px solid #333;">${Object.keys(roles).map(k => `<option value="${k}" ${u.role===k?'selected':''}>${roles[k].n}</option>`).join('')}</select></div>`;
                }
            });
        });

        async function handleAuth() {
            const n = document.getElementById('log-nick').value, p = document.getElementById('log-pass').value, rem = document.getElementById('log-rem').checked;
            if(!n || !p) return;
            const snap = await db.collection("users").where("nick", "==", n).where("pass", "==", p).get();
            
            let userObj;
            if(snap.empty) {
                const doc = await db.collection("users").add({ nick: n, pass: p, role: 'sturgiyali' });
                userObj = { id: doc.id, nick: n, role: 'sturgiyali' };
            } else {
                const d = snap.docs[0];
                userObj = { id: d.id, nick: d.data().nick, role: d.data().role };
            }

            if(rem) localStorage.setItem('sturgia_user', JSON.stringify(userObj));
            applyLogin(userObj);
            toggleModal('login', false);
        }

        function applyLogin(user) {
            me = user;
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('user-section').style.display = 'flex';
            document.getElementById('user-name').innerText = user.nick;
            if(user.role === 'admin') document.getElementById('admin-tools').style.display = 'block';
        }

        window.onload = () => {
            const saved = localStorage.getItem('sturgia_user');
            if(saved) applyLogin(JSON.parse(saved));
        };

        async function updatePassword() {
            const np = document.getElementById('new-pw').value;
            if(!np || !me) return;
            await db.collection("users").doc(me.id).update({ pass: np });
            alert("Şifre güncellendi!");
            toggleModal('pw', false);
        }

        async function setRole(id, role) { await db.collection("users").doc(id).update({ role }); }
        function switchTab(t) { document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab')); document.getElementById('tab-'+t).classList.add('active-tab'); }
        function toggleModal(m, show) { document.getElementById(m+'-modal').style.display = show ? 'flex' : 'none'; }
        function logout() { localStorage.removeItem('sturgia_user'); location.reload(); }
    </script>
</body>
</html>
