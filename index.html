<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Sturgia Clan | Premium Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root {
  --bg: #020205;
  --accent: #7dd3fc;
  --glass: rgba(255, 255, 255, 0.03);
  --border: rgba(255, 255, 255, 0.08);
  --sidebar-w: 260px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: #cbd5e1;
  font-family: 'Outfit', sans-serif;
  overflow-x: hidden;
}

/* Three.js Background */
#bg-canvas { position: fixed; inset: 0; z-index: -1; }

/* Sidebar */
.sidebar {
  position: fixed; left: 0; top: 0; width: var(--sidebar-w); height: 100vh;
  background: rgba(2, 2, 5, 0.8);
  backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 100;
}
.brand { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); }
.brand h2 { font-family: 'Orbitron', sans-serif; font-size: 18px; color: #fff; letter-spacing: 4px; }

.nav-menu { padding: 20px 0; flex-grow: 1; }
.nav-item {
  display: flex; align-items: center; gap: 15px; padding: 15px 25px;
  color: #64748b; text-decoration: none; font-size: 14px; transition: 0.3s;
}
.nav-item:hover, .nav-item.active { color: var(--accent); background: rgba(125, 211, 252, 0.05); }

/* Main Content */
.main { margin-left: var(--sidebar-w); padding: 50px; }

/* Hero */
.hero { margin-bottom: 60px; }
.hero h1 { font-family: 'Orbitron', sans-serif; font-size: 4rem; color: #fff; line-height: 1; }
.hero span { color: var(--accent); }

/* Grid Layout */
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }

/* Global Card Design */
.card {
  background: var(--glass);
  border: 1px solid var(--border);
  padding: 30px; border-radius: 12px;
  backdrop-filter: blur(10px);
}
.card h3 { font-size: 12px; letter-spacing: 2px; color: #64748b; margin-bottom: 20px; text-transform: uppercase; }

/* Rol Yönetimi Stilleri */
.role-input-wrap { display: flex; gap: 10px; margin-bottom: 20px; }
input {
  flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  padding: 12px; border-radius: 6px; color: #fff; outline: none;
}
.btn-add { background: var(--accent); color: #000; border: none; padding: 0 20px; border-radius: 6px; font-weight: 700; cursor: pointer; }

.role-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px; border-bottom: 1px solid var(--border);
}
.btn-del { color: #ef4444; background: none; border: none; cursor: pointer; font-size: 11px; }

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .main { margin-left: 0; padding: 20px; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="sidebar">
  <div class="brand">
    <h2>STURGIA</h2>
    <p style="font-size: 10px; color: #475569; margin-top: 5px;">ELITE CLAN SYSTEM</p>
  </div>
  <nav class="nav-menu">
    <a href="#" class="nav-item active"><i class="fas fa-th-large"></i> DASHBOARD</a>
    <a href="#" class="nav-item"><i class="fas fa-users"></i> MEMBERS</a>
    <a href="#" class="nav-item"><i class="fas fa-comments"></i> FORUM</a>
    <a href="#" class="nav-item"><i class="fas fa-image"></i> GALLERY</a>
    <a href="#" class="nav-item" style="margin-top: auto; color: #f59e0b;"><i class="fas fa-crown"></i> ADMIN</a>
  </nav>
</div>

<div class="main">
  <header class="hero">
    <h1>STURGIA <span>CLAN</span></h1>
    <p style="margin-top: 15px; color: #64748b;">Dominance through discipline. The ultimate clan management portal.</p>
  </header>

  <div class="grid">
    <div class="card">
      <h3>Klan Durumu</h3>
      <div style="font-size: 40px; font-weight: 900; color: #fff; font-family: 'Orbitron';">48/50</div>
      <p style="color: var(--accent); font-size: 12px; margin-top: 5px;">ÜYELER AKTİF</p>
    </div>

    <div class="card">
      <h3>Rol Yönetimi</h3>
      <div class="role-input-wrap">
        <input type="text" id="roleInp" placeholder="Yeni rol adı...">
        <button class="btn-add" onclick="addRole()">EKLE</button>
      </div>
      <div id="roleDisplay"></div>
    </div>

    <div class="card">
      <h3>Son Duyurular</h3>
      <div style="font-size: 14px; border-left: 2px solid var(--accent); padding-left: 15px;">
        <p>Haftalık klan savaşı bu Pazar 21:00'da başlayacak. Hazır olun!</p>
        <span style="font-size: 10px; color: #475569;">25 Nisan 2026</span>
      </div>
    </div>
  </div>
</div>

<script>
// --- THREE.JS BACKGROUND ---
(function() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);

  const geometry = new THREE.BufferGeometry();
  const vertices = [];
  for (let i = 0; i < 7000; i++) {
    vertices.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
  }
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  const material = new THREE.PointsMaterial({ color: 0x7dd3fc, size: 0.8, transparent: true, opacity: 0.5 });
  const points = new THREE.Points(geometry, material);
  scene.add(points);
  camera.position.z = 1000;

  function animate() {
    requestAnimationFrame(animate);
    points.rotation.y += 0.0006;
    points.rotation.x += 0.0002;
    renderer.render(scene, camera);
  }
  animate();
})();

// --- ROL YÖNETİMİ (HATASIZ) ---
function addRole() {
  const input = document.getElementById('roleInp');
  if(!input.value.trim()) return;
  let roles = JSON.parse(localStorage.getItem('st_roles') || '[]');
  roles.push(input.value.trim());
  localStorage.setItem('st_roles', JSON.stringify(roles));
  input.value = "";
  renderRoles();
}

function delRole(idx) {
  let roles = JSON.parse(localStorage.getItem('st_roles'));
  roles.splice(idx, 1);
  localStorage.setItem('st_roles', JSON.stringify(roles));
  renderRoles();
}

function renderRoles() {
  const display = document.getElementById('roleDisplay');
  let roles = JSON.parse(localStorage.getItem('st_roles') || '[]');
  display.innerHTML = roles.map((r, i) => `
    <div class="role-item">
      <span>${r}</span>
      <button class="btn-del" onclick="delRole(${i})"><i class="fas fa-trash"></i> SİL</button>
    </div>
  `).join('');
}
document.addEventListener('DOMContentLoaded', renderRoles);
</script>

</body>
</html>
