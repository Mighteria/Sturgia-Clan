<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sturgia Clan | Elite Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- 🔥 CRYPTOJS - ŞİFRE GÜVENLİĞİ İÇİN -->
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.js"></script>

    <style>
        /* TÜM CSS AYNI - DEĞİŞMEDİ */
        :root {
            --black: #050608;
            --deep: #0b0d12;
            --panel: #0f1118;
            --card: #13161e;
            --border: rgba(255,255,255,0.06);
            --ice: #a8d8ea;
            --frost: #c9e8f4;
            --steel: #8096b0;
            --gold: #c9a84c;
            --gold-light: #e8c96a;
            --red: #c0392b;
            --green: #4caf7d;
            --text: #d4dce8;
            --muted: #5a6a7e;
            --sidebar-w: 270px;
        }

        /* ... TÜM CSS KODUN AYNI ... (kısalttım, orijinalini koru) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        /* Devam eden tüm CSS aynı kalıyor */
    </style>
</head>
<body>
    <!-- TÜM HTML AYNI - SADECE SCRIPT DEĞİŞTİ -->
    
    <!-- SIDEBAR, MAIN, MODAL'lar aynı... -->

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getFirestore, collection, onSnapshot, query, where,
            getDocs, addDoc, updateDoc, deleteDoc, doc, orderBy, serverTimestamp, getDoc
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKd2xNlNn9pi6foaLGix8MOSasqehoS_U",
            authDomain: "sturgia-clan.firebaseapp.com",
            projectId: "sturgia-clan",
            storageBucket: "sturgia-clan.firebasestorage.app",
            messagingSenderId: "257587521790",
            appId: "1:257587521790:web:59b1a1b38029d1564dddaf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let user = JSON.parse(localStorage.getItem('st_session')) || null;
        let currentForumPostId = null;
        let currentFilter = 'all';
        let countdownInterval = null; // 🔥 Global countdown

        const roles = {
            'admin':      { n: 'Yönetici',        c: 'rank-admin' },
            'westra':     { n: 'Westra / Abak 🌊', c: 'rank-westra' },
            'sturgiyali': { n: 'Sturgiyalı',       c: 'rank-sturgiyali' }
        };

        const tagLabels = {
            general: 'Genel', strategy: 'Strateji',
            event: 'Etkinlik', suggestion: 'Öneri', bug: 'Hata'
        };

        // 🔥 GÜVENLİ HTML ESCAPE
        function escHtml(s) {
            const div = document.createElement('div');
            div.textContent = s || '';
            return div.innerHTML;
        }

        // 🔥 GÜZEL MUTE COUNTDOWN
        function startMuteCountdown(until) {
            if (countdownInterval) clearInterval(countdownInterval);
            const el = document.getElementById('mute-countdown');
            
            if (until === 'permanent') { 
                el.innerText = 'KALICI'; 
                return; 
            }
            
            const end = new Date(until);
            countdownInterval = setInterval(() => {
                const diff = end - new Date();
                if (diff <= 0) { 
                    clearInterval(countdownInterval); 
                    location.reload(); 
                    return; 
                }
                
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                
                if (days > 0) el.innerText = `${days}g ${hours}sa`;
                else if (hours > 0) el.innerText = `${hours}sa ${minutes}d`;
                else el.innerText = `${minutes}d ${seconds}s`;
            }, 1000);
        }

        function isMutedNow(data) {
            if (!data.muteUntil) return false;
            if (data.muteUntil === 'permanent') return true;
            return new Date(data.muteUntil) > new Date();
        }

        // ─── TOAST ───
        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            const tx = document.getElementById('toast-text');
            tx.innerText = msg;
            t.style.borderColor = isError ? 'rgba(192,57,43,0.4)' : 'rgba(168,216,234,0.2)';
            t.style.color = isError ? '#e57373' : 'var(--ice)';
            t.querySelector('i').style.color = isError ? '#e57373' : 'var(--ice)';
            t.querySelector('i').className = isError ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ─── USERS SNAPSHOT (aynı) ───
        let allUsers = {};
        onSnapshot(collection(db, "users"), (snap) => {
            // ... aynı kod (kısalttım)
            allUsers = {};
            snap.forEach(s => { allUsers[s.id] = { id: s.id, ...s.data() }; });
            // Grid, table, members güncellemeleri aynı...
        });

        // ─── CHAT (aynı) ───
        onSnapshot(query(collection(db, "messages"), orderBy("ts")), (snap) => {
            // Aynı chat kodu...
        });

        // 🔥 GÜVENLİ AUTH - YENİ!
        window.processAuth = async () => {
            const n = document.getElementById('login-nick').value.trim();
            const p = document.getElementById('login-pass').value;
            
            if (!n || !p || p.length < 4) { 
                showToast('Nick ve 4+ karakter şifre gerekli', true); 
                return; 
            }

            // 🔥 SHA256 HASH - GÜVENLİ ŞİFRE!
            const passHash = CryptoJS.SHA256(p).toString();
            
            try {
                const q = query(collection(db, "users"), where("nick", "==", n), where("passHash", "==", passHash));
                const snap = await getDocs(q);
                
                let d;
                if (snap.empty) {
                    // Yeni kullanıcı
                    const res = await addDoc(collection(db, "users"), { 
                        nick: n, 
                        passHash: passHash,  // ✅ HASH KAYIT
                        role: 'sturgiyali', 
                        muteUntil: null 
                    });
                    d = { id: res.id, nick: n, role: 'sturgiyali' };
                    showToast('✅ Hesap oluşturuldu! Hoş geldin ' + n);
                } else {
                    d = { id: snap.docs[0].id, ...snap.docs[0].data() };
                    showToast('✅ Tekrar hoş geldin, ' + d.nick + '!');
                }

                localStorage.setItem('st_session', JSON.stringify(d));
                setTimeout(() => location.reload(), 800);
            } catch (e) {
                showToast('Bağlantı hatası', true);
                console.error(e);
            }
        };

        // 🔥 GÜVENLİ ŞİFRE GÜNCELLEME
        window.updatePassword = async () => {
            const np = document.getElementById('new-password').value;
            if (!user || !np || np.length < 4) { 
                showToast('4+ karakter şifre gir', true); 
                return; 
            }
            
            try {
                const passHash = CryptoJS.SHA256(np).toString();
                await updateDoc(doc(db, "users", user.id), { passHash });
                showToast('✅ Şifre güvenli şekilde güncellendi');
                document.getElementById('new-password').value = '';
            } catch (e) {
                showToast('Güncelleme hatası', true);
            }
        };

        // ─── DİĞER FONKSİYONLAR (aynı) ───
        window.sendMessage = async () => { /* aynı */ };
        window.deleteMsg = async (id) => { /* aynı */ };
        window.openMuteModal = (id, nick) => { /* aynı */ };
        window.applyMute = async () => { /* aynı */ };
        window.unmute = async (id) => { /* aynı */ };
        // Forum fonksiyonları aynı...

        // ─── SESSION & UI ───
        document.addEventListener('DOMContentLoaded', () => {
            if (user) {
                document.getElementById('auth-section').classList.add('d-none');
                document.getElementById('user-section').classList.remove('d-none');
                document.getElementById('display-nick').innerText = user.nick;
                const r = roles[user.role] || roles['sturgiyali'];
                document.getElementById('display-rank').innerText = r.n;
                
                // 🔥 ADMIN NAV GÖSTER
                if (user.role === 'admin') {
                    document.getElementById('admin-nav-item').classList.remove('d-none');
                }
            }
        });

        window.logout = () => { localStorage.removeItem('st_session'); location.reload(); };
        window.show = (p) => { /* aynı */ };
        window.openModal = () => { /* aynı */ };
        window.closeModal = () => { /* aynı */ };

        // Diğer tüm fonksiyonlar aynı...
    </script>
</body>
</html>
