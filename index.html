<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Sturgia Clan | Elite Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root { --sturgia-dark: #172b4d; --sturgia-blue: #5e72e4; }
        body { background-color: #f8f9fe; font-family: 'Open Sans', sans-serif; }
        .sidenav { background: var(--sturgia-dark) !important; }
        .nav-link { color: rgba(255,255,255,.8) !important; font-weight: 600; }
        .nav-link:hover, .nav-link.active { color: #fff !important; background: rgba(255,255,255,.1); border-radius: 8px; }
        .main-content { margin-left: 250px; padding: 30px; }
        .card { border: none; box-shadow: 0 0 2rem 0 rgba(136, 152, 170, .15); border-radius: 1rem; }
        .sturgia-header { background: linear-gradient(87deg, #11cdef 0, #1171ef 100%) !important; padding: 4rem 0; border-radius: 1rem; color: white; }
        @media (max-width: 768px) { .main-content { margin-left: 0; } .sidenav { display: none; } }
    </style>
</head>
<body>

    <nav class="sidenav fixed-start vertical-nav p-3 h-100 shadow" style="width: 250px; position: fixed;">
        <div class="text-center mb-4">
            <img src="https://i.ibb.co/3p3r3mH/image-16de68.jpg" class="rounded-circle border border-2 border-primary" style="width: 80px; height: 80px; object-fit: cover;" alt="Logo">
            <h4 class="text-white mt-3 fw-bold tracking-tight">STURGIA</h4>
        </div>
        <hr class="text-white opacity-25">
        <div class="nav flex-column">
            <a href="#" onclick="show('home')" class="nav-link mb-2 active"><i class="fas fa-tv me-2"></i> Anasayfa</a>
            <a href="#" onclick="show('warriors')" class="nav-link mb-2"><i class="fas fa-users me-2"></i> Savaşçılar</a>
            <a href="#" onclick="show('settings')" class="nav-link mb-2"><i class="fas fa-key me-2"></i> Şifre Değiş</a>
            <div id="admin-nav-item" class="d-none">
                <a href="#" onclick="show('admin')" class="nav-link text-warning"><i class="fas fa-user-shield me-2"></i> Admin Paneli</a>
            </div>
        </div>
        <div class="position-absolute bottom-0 start-0 w-100 p-3">
            <div id="auth-section">
                <button onclick="openModal()" class="btn btn-primary w-100 fw-bold">GİRİŞ YAP</button>
            </div>
            <div id="user-section" class="d-none text-center">
                <span id="display-nick" class="text-info fw-bold d-block mb-2"></span>
                <button onclick="logout()" class="btn btn-sm btn-outline-danger w-100">Çıkış Yap</button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <section id="page-home">
            <div class="sturgia-header text-center mb-5 shadow">
                <h1 class="display-3 fw-bolder italic">KUZEYİN SOĞUK NEFESİ</h1>
                <p class="lead opacity-80">Sturgia klanı, sadakat ve onur üzerine kurulu bir kardeşliktir.</p>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <div class="card p-4 text-center">
                        <h6 class="text-uppercase text-muted ls-1 mb-1">Toplam Güç</h6>
                        <h2 id="army-total" class="display-4 fw-bold mb-0">0</h2>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-warriors" class="d-none">
            <div class="card p-4">
                <h3 class="fw-bold mb-4"><i class="fas fa-shield-alt text-primary"></i> Aktif Savaşçılar</h3>
                <div id="warrior-grid" class="row g-3"></div>
            </div>
        </section>

        <section id="page-settings" class="d-none">
            <div class="card p-5 max-w-500 shadow">
                <h3 class="fw-bold mb-4">Güvenlik Ayarları</h3>
                <div class="form-group mb-3">
                    <label class="form-label text-muted small fw-bold">YENİ ŞİFRE</label>
                    <input type="password" id="new-password" class="form-control form-control-lg bg-light" placeholder="••••••••">
                </div>
                <button onclick="updatePassword()" class="btn btn-primary btn-lg w-100 fw-bold">ŞİFREYİ GÜNCELLE</button>
            </div>
        </section>

        <section id="page-admin" class="d-none">
            <div class="card shadow">
                <div class="card-header border-0 bg-white">
                    <h3 class="mb-0 fw-bold">Klan Yönetimi</h3>
                </div>
                <div class="table-responsive">
                    <table class="table align-items-center table-flush">
                        <thead class="thead-light">
                            <tr>
                                <th>Savaşçı</th>
                                <th>Rütbe</th>
                                <th class="text-end">İşlem</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 p-4 shadow-lg">
                <h2 class="fw-bold text-center mb-4">Klan Girişi</h2>
                <input type="text" id="login-nick" class="form-control mb-3 p-3" placeholder="Savaşçı Adı">
                <input type="password" id="login-pass" class="form-control mb-3 p-3" placeholder="Şifre">
                <button onclick="processAuth()" class="btn btn-primary btn-lg w-100 fw-bold">DEVAM ET</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, getDocs, addDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKd2xNlNn9pi6foaLGix8MOSasqehoS_U",
            authDomain: "sturgia-clan.firebaseapp.com",
            projectId: "sturgia-clan",
            storageBucket: "sturgia-clan.firebasestorage.app",
            messagingSenderId: "257587521790",
            appId: "1:257587521790:web:59b1a1b38029d1564dddaf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let user = JSON.parse(localStorage.getItem('st_session')) || null;

        const roles = {
            'admin': { n: 'Yönetici', c: 'bg-danger' },
            'westra': { n: 'Westra / Abak 🌊', c: 'bg-info text-dark' },
            'sturgiyali': { n: 'Sturgiyalı', c: 'bg-secondary' }
        };

        // Otomatik Veri Güncelleme
        onSnapshot(collection(db, "users"), (snap) => {
            const grid = document.getElementById('warrior-grid');
            const table = document.getElementById('admin-table-body');
            const count = document.getElementById('army-total');
            grid.innerHTML = ""; table.innerHTML = ""; count.innerText = snap.size;

            snap.forEach(s => {
                const data = s.data();
                const r = roles[data.role] || roles['sturgiyali'];
                grid.innerHTML += `<div class="col-md-4"><div class="card p-3 d-flex flex-row justify-content-between"><b>${data.nick}</b><span class="badge ${r.c}">${r.n}</span></div></div>`;
                if(user?.role === 'admin') {
                    table.innerHTML += `<tr><td><b>${data.nick}</b></td><td>${r.n}</td><td class="text-end"><select onchange="updRole('${s.id}', this.value)" class="form-select form-select-sm w-auto d-inline">${Object.keys(roles).map(k => `<option value="${k}" ${data.role===k?'selected':''}>${roles[k].n}</option>`).join('')}</select></td></tr>`;
                }
            });
        });

        window.processAuth = async () => {
            const n = document.getElementById('login-nick').value, p = document.getElementById('login-pass').value;
            const q = query(collection(db, "users"), where("nick", "==", n), where("pass", "==", p));
            const snap = await getDocs(q);
            let d;
            if(snap.empty) {
                const res = await addDoc(collection(db, "users"), { nick: n, pass: p, role: 'sturgiyali' });
                d = { id: res.id, nick: n, role: 'sturgiyali' };
            } else { d = { id: snap.docs[0].id, ...snap.docs[0].data() }; }
            localStorage.setItem('st_session', JSON.stringify(d));
            location.reload();
        };

        window.updatePassword = async () => {
            const np = document.getElementById('new-password').value;
            if(user && np) { await updateDoc(doc(db, "users", user.id), { pass: np }); alert("Şifre Başarıyla Güncellendi!"); }
        };

        window.updRole = async (id, r) => { await updateDoc(doc(db, "users", id), { role: r }); };

        if(user) {
            document.getElementById('auth-section').classList.add('d-none');
            document.getElementById('user-section').classList.remove('d-none');
            document.getElementById('display-nick').innerText = user.nick;
            if(user.role === 'admin') document.getElementById('admin-nav-item').classList.remove('d-none');
        }

        window.logout = () => { localStorage.removeItem('st_session'); location.reload(); };
        window.show = (p) => { document.querySelectorAll('section').forEach(s => s.classList.add('d-none')); document.getElementById('page-'+p).classList.remove('d-none'); };
        window.openModal = () => new bootstrap.Modal('#loginModal').show();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
