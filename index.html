<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sturgia Elite | Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .accent-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen custom-scroll">

    <nav class="sticky top-0 z-50 glass border-b border-slate-800 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://i.ibb.co/L8p6M5t/sturgia-logo-fix.png" class="w-10 h-10 object-contain" alt="Logo">
                <span class="text-xl font-extrabold tracking-tighter">STURGIA</span>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="showPage('home')" class="hover:text-blue-400 transition font-medium">Anasayfa</button>
                <button onclick="showPage('warriors')" class="hover:text-blue-400 transition font-medium text-slate-400">Savaşçılar</button>
                <div id="auth-ui">
                    <button onclick="openModal('auth')" class="accent-gradient px-5 py-2 rounded-full font-bold text-sm shadow-lg shadow-blue-500/20">Giriş Yap</button>
                </div>
                <div id="user-ui" class="hidden flex items-center gap-4">
                    <span id="nav-username" class="text-blue-400 font-bold border-r border-slate-700 pr-4"></span>
                    <button onclick="logout()" class="text-red-400 text-sm hover:underline">Çıkış</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 mt-8">
        
        <div id="page-home" class="page-content grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="glass p-10 rounded-3xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 blur-3xl"></div>
                    <h1 class="text-4xl font-extrabold mb-4 italic">Kuzeyin Soğuk Nefesi</h1>
                    <p class="text-slate-400 leading-relaxed">
                        Sturgia klanı, sadakat ve onur üzerine kurulu bir kardeşliktir. Kuzeyin sert topraklarında omuz omuza savaşıyoruz. Hoş geldin savaşçı.
                    </p>
                </div>
                
                <div id="admin-panel" class="hidden glass p-8 rounded-3xl border-blue-500/30">
                    <h3 class="text-blue-400 font-bold mb-4 flex items-center gap-2">🛡️ Yönetim Merkezi</h3>
                    <div id="admin-list" class="space-y-3"></div>
                </div>
            </div>
            
            <div class="space-y-6">
                <div class="glass p-8 rounded-3xl text-center">
                    <h4 class="text-slate-400 text-sm font-bold uppercase mb-2">Ordu Gücü</h4>
                    <div id="army-count" class="text-6xl font-black text-white">0</div>
                    <p class="text-slate-500 mt-2 text-xs">Aktif Savaşçı</p>
                </div>
            </div>
        </div>

        <div id="page-warriors" class="page-content hidden">
            <div class="glass p-8 rounded-3xl">
                <h2 class="text-2xl font-bold mb-8 italic">Aktif Savaşçılar</h2>
                <div id="warriors-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
        </div>
    </main>

    <div id="modal-auth" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden items-center justify-center p-4">
        <div class="glass max-w-md w-full p-10 rounded-[40px] shadow-2xl">
            <h2 class="text-3xl font-black mb-8">Klan Girişi</h2>
            <div class="space-y-4">
                <input type="text" id="auth-nick" placeholder="Savaşçı Adı" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500 transition">
                <input type="password" id="auth-pass" placeholder="Şifre" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500 transition">
                <div class="flex items-center gap-3 px-2">
                    <input type="checkbox" id="auth-remember" class="w-4 h-4 rounded border-slate-700 bg-slate-900">
                    <label for="auth-remember" class="text-sm text-slate-400">Beni Hatırla</label>
                </div>
                <button onclick="handleAuth()" class="w-full accent-gradient py-4 rounded-2xl font-black text-lg mt-4 shadow-lg shadow-blue-500/30">Devam Et</button>
            </div>
            <button onclick="closeModal('auth')" class="w-full text-slate-500 text-sm mt-6 hover:text-slate-300">Kapat</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot, addDoc, getDocs, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Senin Gönderdiğin Firebase Bilgileri
        const firebaseConfig = {
            apiKey: "AIzaSyDKd2xNlNn9pi6foaLGix8MOSasqehoS_U",
            authDomain: "sturgia-clan.firebaseapp.com",
            projectId: "sturgia-clan",
            storageBucket: "sturgia-clan.firebasestorage.app",
            messagingSenderId: "257587521790",
            appId: "1:257587521790:web:59b1a1b38029d1564dddaf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = JSON.parse(localStorage.getItem('sturgia_final_user')) || null;

        const roles = {
            'admin': { n: '</> Yönetici', c: 'bg-blue-500 shadow-blue-500/40' },
            'westra': { n: 'Westra / Abak 🌊', c: 'bg-cyan-500 shadow-cyan-500/40' },
            'rehber_plus': { n: 'Rehber+', c: 'bg-indigo-600 shadow-indigo-600/40' },
            'ally': { n: 'Ally', c: 'bg-pink-500 shadow-pink-500/40' },
            '216': { n: '216', c: 'bg-sky-400 shadow-sky-400/40' },
            'asistan': { n: 'Asistan', c: 'bg-purple-600 shadow-purple-600/40' },
            'rehber': { n: 'Rehber', c: 'bg-emerald-600 shadow-emerald-600/40' },
            'buyuk': { n: 'Büyük Sturgiyalı', c: 'bg-red-600 shadow-red-600/40' },
            'onemli': { n: 'Önemli Sturgiyalı', c: 'bg-violet-600 shadow-violet-600/40' },
            'sturgiyali': { n: 'Sturgiyalı', c: 'bg-slate-600 shadow-slate-600/40' }
        };

        // Realtime Veri Akışı
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('warriors-list');
            const admList = document.getElementById('admin-list');
            const count = document.getElementById('army-count');
            
            list.innerHTML = "";
            admList.innerHTML = "";
            count.innerText = snap.size;

            snap.forEach(docSnap => {
                const u = docSnap.data();
                const r = roles[u.role] || roles['sturgiyali'];
                
                list.innerHTML += `
                    <div class="glass p-5 rounded-2xl flex justify-between items-center border-l-4 border-l-${u.role === 'admin' ? 'blue' : 'slate'}-500">
                        <span class="font-bold text-slate-200">${u.nick}</span>
                        <span class="${r.c} text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-tighter shadow-sm text-white">${r.n}</span>
                    </div>`;
                
                if(currentUser?.role === 'admin') {
                    admList.innerHTML += `
                        <div class="flex justify-between items-center bg-slate-900/40 p-4 rounded-xl border border-slate-800">
                            <span class="text-sm font-bold text-slate-300">${u.nick}</span>
                            <select onchange="updateUserRole('${docSnap.id}', this.value)" class="bg-black text-xs p-1.5 rounded border border-slate-700 outline-none focus:border-blue-500">
                                ${Object.keys(roles).map(k => `<option value="${k}" ${u.role === k ? 'selected' : ''}>${roles[k].n}</option>`).join('')}
                            </select>
                        </div>`;
                }
            });
        });

        window.handleAuth = async () => {
            const nick = document.getElementById('auth-nick').value;
            const pass = document.getElementById('auth-pass').value;
            const rem = document.getElementById('auth-remember').checked;

            if(!nick || !pass) return alert("Bilgileri gir kanka!");

            const q = query(collection(db, "users"), where("nick", "==", nick), where("pass", "==", pass));
            const snap = await getDocs(q);

            let user;
            if(snap.empty) {
                const newDoc = await addDoc(collection(db, "users"), { nick, pass, role: 'sturgiyali' });
                user = { id: newDoc.id, nick, role: 'sturgiyali' };
            } else {
                const d = snap.docs[0];
                user = { id: d.id, ...d.data() };
            }

            if(rem) localStorage.setItem('sturgia_final_user', JSON.stringify(user));
            login(user);
            closeModal('auth');
        };

        window.updateUserRole = async (id, newRole) => {
            await updateDoc(doc(db, "users", id), { role: newRole });
        };

        function login(user) {
            currentUser = user;
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('user-ui').classList.remove('hidden');
            document.getElementById('nav-username').innerText = user.nick;
            if(user.role === 'admin') document.getElementById('admin-panel').classList.remove('hidden');
        }

        if(currentUser) login(currentUser);

        window.logout = () => { localStorage.removeItem('sturgia_final_user'); location.reload(); };
        window.showPage = (p) => { 
            document.querySelectorAll('.page-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('page-' + p).classList.remove('hidden');
        };
        window.openModal = (m) => document.getElementById('modal-' + m).classList.replace('hidden', 'flex');
        window.closeModal = (m) => document.getElementById('modal-' + m).classList.replace('flex', 'hidden');
    </script>
</body>
</html>
