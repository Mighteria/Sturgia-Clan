<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sturgia Clan | Northern Kings</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sturgia-blue: #3498db;
            --sturgia-dark: #0a0e14;
            --glass: rgba(15, 25, 35, 0.9);
            --border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body {
            background: var(--sturgia-dark); color: #d1d8e0; min-height: 100vh;
            background-image: linear-gradient(rgba(10, 14, 20, 0.85), rgba(10, 14, 20, 0.95)), url('https://images.alphacoders.com/100/1005370.jpg');
            background-attachment: fixed; background-size: cover;
        }
        nav { background: rgba(10, 14, 20, 0.95); height: 70px; display: flex; align-items: center; border-bottom: 2px solid var(--sturgia-blue); position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1400px; margin: 0 auto; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; }
        .nav-links a { color: #fff; text-decoration: none; margin-right: 30px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .nav-links a:hover { color: var(--sturgia-blue); }
        
        .hero { height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero img { width: 100px; filter: drop-shadow(0 0 20px var(--sturgia-blue)); margin-bottom: 10px; }
        
        .wrapper { max-width: 1400px; margin: 20px auto 100px; display: grid; grid-template-columns: 1fr 350px; gap: 30px; padding: 0 30px; }
        .tab-content { display: none; animation: fadeIn 0.5s ease; }
        .active-tab { display: block; }
        
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 10px; padding: 30px; margin-bottom: 25px; backdrop-filter: blur(10px); }
        .card-header { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: #fff; margin-bottom: 20px; border-left: 5px solid var(--sturgia-blue); padding-left: 15px; }
        
        .role-tag { padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; font-family: 'Orbitron'; display: flex; align-items: center; gap: 5px; }
        .role-admin { color: #70a1ff; border: 1px solid #70a1ff; }

        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(255,255,255,0.02); margin-bottom: 8px; border-radius: 6px; border: 1px solid var(--border); }

        .btn { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: 700; text-transform: uppercase; font-family: 'Orbitron'; font-size: 0.8rem; }
        .btn-blue { background: var(--sturgia-blue); color: white; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #101620; padding: 40px; width: 400px; border-radius: 15px; border: 1px solid var(--sturgia-blue); }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav>
    <div class="nav-container">
        <div class="nav-links">
            <a onclick="showTab('home')">Anasayfa</a>
            <a onclick="showTab('warriors')">Savaşçılar</a>
        </div>
        <div id="auth-ui">
            <button class="btn btn-blue" onclick="openModal()">Giriş</button>
        </div>
        <div id="user-ui" style="display:none; align-items:center;">
            <span id="u-display" style="color:var(--sturgia-blue); font-family:'Orbitron';"></span>
            <button class="btn btn-blue" onclick="logout()" style="margin-left:15px; padding:5px 10px;">ÇIK</button>
        </div>
    </div>
</nav>

<div class="hero">
    <img src="https://static.wikia.nocookie.net/mountandblade/images/6/6e/Bannerlord_Sturgia_Banner.png">
    <h1 style="font-family:'Montserrat'; letter-spacing:8px;">STURGIA</h1>
</div>

<div class="wrapper">
    <div class="main">
        <div id="home" class="tab-content active-tab">
            <div class="card">
                <div class="card-header">Klan Ruhu</div>
                <p>Sturgia bir aileden farksızdır. Kuzeyin sert rüzgarlarında birbirimize omuz veririz.</p>
            </div>
            
            <div id="admin-panel" class="card" style="display:none; border-color:#70a1ff;">
                <div class="card-header" style="color:#70a1ff; border-left-color:#70a1ff;">Rütbe Dağılımı</div>
                <div id="promote-list"></div>
            </div>
        </div>

        <div id="warriors" class="tab-content">
            <div class="card">
                <div class="card-header">Klan Üyeleri</div>
                <div id="warrior-list"></div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="card" style="text-align:center;">
            <div class="card-header" style="border:none; justify-content:center;">SAVAŞÇI SAYISI</div>
            <div id="total-count" style="font-size:3rem; font-family:'Orbitron';">0</div>
        </div>
    </div>
</div>

<div id="authModal" class="modal">
    <div class="modal-content">
        <h2 style="color:#fff; font-family:'Orbitron';">GİRİŞ</h2>
        <input type="text" id="m-nick" placeholder="İsim">
        <input type="password" id="m-pass" placeholder="Şifre">
        <button class="btn btn-blue" onclick="doLogin()" style="width:100%; margin-top:10px;">DEVAM</button>
        <p onclick="closeAll()" style="text-align:center; cursor:pointer; margin-top:15px; color:gray;">Kapat</p>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "...", authDomain: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "..." };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const roles = {
        'admin': { label: '</> Yönetici', class: 'role-admin' },
        'westra': { label: 'Westra / Abak 🌊', color: '#54a0ff' },
        'rehber_plus': { label: 'Sturgiyalı Rehber+', color: '#000080' },
        'ally': { label: 'Ally', color: '#ff00ff' },
        '216': { label: '216', color: '#74b9ff' },
        'asistan': { label: 'Sturgiyalı Asistan', color: '#8e44ad' },
        'rehber': { label: 'Sturgiyalı Rehber', color: '#27ae60' },
        'buyuk': { label: 'Büyük Sturgiyalı', color: '#c0392b' },
        'onemli': { label: 'Önemli Sturgiyalı', color: '#8e44ad' },
        'sturgiyali': { label: 'Sturgiyalı', color: '#3498db' }
    };

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.getElementById(id).classList.add('active-tab');
        if(id === 'warriors') loadWarriors();
    }

    async function loadWarriors() {
        const snap = await db.collection("users").get();
        const list = document.getElementById('warrior-list');
        list.innerHTML = "";
        snap.forEach(doc => {
            const u = doc.data();
            const role = roles[u.role] || roles['sturgiyali'];
            list.innerHTML += `
                <div class="user-item">
                    <span style="font-weight:bold;">${u.nick}</span>
                    <span class="role-tag ${role.class || ''}" style="color:${role.color || 'inherit'}">
                        ${role.label}
                    </span>
                </div>`;
        });
        document.getElementById('total-count').innerText = snap.size;
    }

    async function doLogin() {
        const n = document.getElementById('m-nick').value, p = document.getElementById('m-pass').value;
        const snap = await db.collection("users").where("nick", "==", n).where("pass", "==", p).get();
        if(snap.empty) {
            const doc = await db.collection("users").add({ nick: n, pass: p, role: 'sturgiyali' });
            loginStep(n, 'sturgiyali', doc.id);
        } else {
            const d = snap.docs[0];
            loginStep(d.data().nick, d.data().role, d.id);
        }
        closeAll();
    }

    function loginStep(nick, role, id) {
        document.getElementById('auth-ui').style.display = 'none';
        document.getElementById('user-ui').style.display = 'flex';
        document.getElementById('u-display').innerText = nick;
        if(role === 'admin') {
            document.getElementById('admin-panel').style.display = 'block';
            loadAdminList();
        }
        loadWarriors();
    }

    async function loadAdminList() {
        const list = document.getElementById('promote-list');
        const snap = await db.collection("users").get();
        list.innerHTML = "";
        snap.forEach(doc => {
            const u = doc.data();
            list.innerHTML += `
                <div class="user-item">
                    <span>${u.nick}</span>
                    <select onchange="updateRole('${doc.id}', this.value)">
                        ${Object.keys(roles).map(r => `<option value="${r}" ${u.role === r ? 'selected' : ''}>${roles[r].label}</option>`).join('')}
                    </select>
                </div>`;
        });
    }

    async function updateRole(id, newRole) {
        await db.collection("users").doc(id).update({ role: newRole });
        loadWarriors();
    }

    function openModal() { document.getElementById('authModal').style.display = 'flex'; }
    function closeAll() { document.getElementById('authModal').style.display = 'none'; }
    function logout() { location.reload(); }
</script>
</body>
</html>
