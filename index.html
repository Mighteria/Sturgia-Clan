<script type="module">
/* =========================
3) FIREBASE + FIX SCRIPT BLOKU
(Eski script type="module" bloğunun yerine bunu koy)
========================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, onSnapshot, query, where,
  getDocs, addDoc, updateDoc, deleteDoc, doc, orderBy, serverTimestamp, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyDKd2xNlNn9pi6foaLGix8MOSasqehoS_U",
  authDomain:"sturgia-clan.firebaseapp.com",
  projectId:"sturgia-clan",
  storageBucket:"sturgia-clan.firebasestorage.app",
  messagingSenderId:"257587521790",
  appId:"1:257587521790:web:59b1a1b38029d1564dddaf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = null;
let allUsers = {};
let messagesCache = [];
let rolesMap = {
  admin:      { name:"Yönetici", color:"#ff7070" },
  westra:     { name:"Westra / Abak 🌊", color:"#a8d8ea" },
  sturgiyali: { name:"Sturgiyalı", color:"#7a96b4" }
};
let editingMessageId = null;
let isSendingMessage = false;

/* ------------ helpers ------------ */
const escHtml = (s)=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const escAttr = (s)=>String(s||"").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
const isMutedNow = (d)=> d?.muteUntil === "permanent" || (d?.muteUntil && new Date(d.muteUntil) > new Date());

window.showToast = (msg, isError=false) => {
  const t = document.getElementById("toast");
  const tx = document.getElementById("toast-text");
  tx.innerText = msg;
  t.style.borderColor = isError ? "rgba(192,57,43,.35)" : "rgba(168,216,234,.2)";
  t.style.color = isError ? "#ff8080" : "var(--ice)";
  t.querySelector("i").className = isError ? "fas fa-exclamation-circle" : "fas fa-check-circle";
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 3500);
};

/* ------------ logo fallback fix ------------ */
(function fixLogo(){
  const logo = document.getElementById("clan-logo");
  if (!logo) return;

  const candidates = [
    "assets/sturgia-logo.png",
    "assets/sturgia.webp",
    "assets/c__Users_murad_AppData_Roaming_Cursor_User_workspaceStorage_3207f2027692b663c0b0fda2bdc6363c_images_Sturgia-868d5ccc-315b-4e13-a44e-b2caeb79a57d.png",
    "assets/c__Users_murad_AppData_Roaming_Cursor_User_workspaceStorage_3207f2027692b663c0b0fda2bdc6363c_images_Sturgia-842cff90-5a67-485d-bfbd-c541f63964b2.png"
  ];

    if (i >= candidates.length) return;
    logo.src = candidates[i++];
  };
  logo.onerror = tryNext;
  tryNext();
})();

/* ------------ session ------------ */
(async function restoreSession(){
  const raw = localStorage.getItem("st_session");
  if (!raw) return;
  try{
    user = JSON.parse(raw);
    const ud = await getDoc(doc(db,"users",user.id));
    if (!ud.exists()) {
      localStorage.removeItem("st_session");
      user = null;
      return;
    }
    const d = ud.data();
    user.role = d.role;
    user.approved = d.approved;
    user.nick = d.nick;
    localStorage.setItem("st_session", JSON.stringify(user));
    hydrateSessionUI();
  }catch{
    localStorage.removeItem("st_session");
    user = null;
  }
})();

function hydrateSessionUI(){
  if (!user) return;
  document.getElementById("auth-section")?.classList.add("d-none");
  document.getElementById("user-section")?.classList.remove("d-none");
  document.getElementById("display-nick").innerText = user.nick;
  document.getElementById("display-rank").innerText = rolesMap[user.role]?.name || user.role;
}

/* ------------ users listener ------------ */
onSnapshot(collection(db,"users"), (snap)=>{
  allUsers = {};
  snap.forEach(s=> allUsers[s.id] = { id:s.id, ...s.data() });
});

/* ------------ roles listener ------------ */
onSnapshot(collection(db,"roles"), (snap)=>{
  if (!snap.empty) {
    const next = {};
    snap.forEach(d=> {
      const data = d.data();
      if (data.archived === true) return; // soft deleted roles hidden
      next[d.id] = data;
    });
    rolesMap = { ...rolesMap, ...next };
  }
  renderRolesPreview();
});

function renderRolesPreview(){
  const box = document.getElementById("roles-preview");
  if (!box) return;
  box.innerHTML = Object.entries(rolesMap).map(([k,r])=>{
    const deletable = user?.role === "admin" && k !== "admin";
    return `
      <span class="role-pill" style="border-color:${r.color || "#a8d8ea"}66;color:${r.color || "#a8d8ea"}">
        ${escHtml(r.name || k)} <small style="opacity:.7;margin-left:4px">(${k})</small>
        ${deletable ? `<i class="fas fa-trash role-del" onclick="deleteRole(event,'${k}')"></i>` : ""}
      </span>
    `;
  }).join("");
}

/* ------------ ROLE DELETE FIX ------------ */
async function ensureFallbackRole(){
  if (rolesMap["sturgiyali"]) return "sturgiyali";
  const nonAdmin = Object.keys(rolesMap).find(k=>k!=="admin");
  if (nonAdmin) return nonAdmin;

  const key = "uyeler";
  await setDoc(doc(db,"roles",key), {
    name:"Üyeler", color:"#8fb0d0", canModerate:false, canCreateRole:false, archived:false
  }, { merge:true });
  rolesMap[key] = { name:"Üyeler", color:"#8fb0d0" };
  return key;
}

window.deleteRole = async (event, roleKey) => {
  event?.preventDefault();
  event?.stopPropagation();

  if (user?.role !== "admin") return showToast("Sadece admin rol silebilir.", true);
  if (roleKey === "admin") return showToast("admin rolü silinemez.", true);

  if (!confirm(`"${roleKey}" rolünü silmek istediğine emin misin?`)) return;

  try {
    const fallbackRole = await ensureFallbackRole();

    // önce kullanıcıları fallback role geçir
    const usersWithRole = await getDocs(query(collection(db,"users"), where("role","==",roleKey)));
    await Promise.all(usersWithRole.docs.map(u =>
      updateDoc(doc(db,"users",u.id), { role:fallbackRole })
    ));

    // hard delete dene
    await deleteDoc(doc(db,"roles",roleKey));
    delete rolesMap[roleKey];
    renderRolesPreview();
    return showToast(`"${roleKey}" rolü silindi.`);
  } catch (err) {
    // hard delete izin yoksa soft delete dene
    try{
      await updateDoc(doc(db,"roles",roleKey), {
        archived:true,
        deletedAt:new Date().toISOString(),
        deletedBy:user?.id || null
      });
      delete rolesMap[roleKey];
      renderRolesPreview();
      return showToast(`"${roleKey}" rolü arşivlendi (soft delete).`);
    }catch(err2){
      return showToast("Rol silinemedi: Firestore yetki kuralı engelliyor.", true);
    }
  }
};

/* ------------ CHAT DISCORD-LIKE TIME GAP FIX ------------ */
function sameDay(a,b){
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function minutesDiff(a,b){
  return Math.abs((a.getTime()-b.getTime())/60000);
}
function fmtTime(ts){
  return ts ? new Date(ts.toDate()).toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}) : "";
}
function fmtDay(date){
  return date.toLocaleDateString("tr-TR",{weekday:"long",day:"2-digit",month:"long"});
}

function renderChatMessages(){
  const box = document.getElementById("chat-messages");
  if (!box) return;

  if (!messagesCache.length){
    box.innerHTML = `<div class="empty-state"><i class="fas fa-comments"></i><p>Henüz mesaj yok. İlk sen yaz!</p></div>`;
    return;
  }

  box.innerHTML = "";
  let lastAuthor = null;
  let lastDate = null;

  messagesCache.forEach(item=>{
    const d = item.data;
    const msgDate = d.ts ? new Date(d.ts.toDate()) : new Date();
    const isOwn = d.uid === user?.id;
    const roleClass = d.role || "sturgiyali";

    const newDay = !lastDate || !sameDay(lastDate, msgDate);
    const bigGap = lastDate ? minutesDiff(lastDate, msgDate) >= 5 : true;
    const authorChanged = lastAuthor !== d.uid;
    const showHeader = newDay || authorChanged || bigGap;

    if (newDay){
      box.innerHTML += `<div class="chat-day-sep">${fmtDay(msgDate)}</div>`;
    }

    const edited = d.editedAt ? `<span style="font-size:10px;color:var(--muted);margin-left:8px">(düzenlendi)</span>` : "";
    const canEdit = !!user && (isOwn || user.role==="admin");
    const canDelete = !!user && (isOwn || user.role==="admin");

    box.innerHTML += `
      <div class="msg-group">
        ${showHeader ? `<div class="msg-author-line"><span class="msg-author ${roleClass}">${escHtml(d.nick || "Bilinmeyen")}</span><span class="msg-time">${fmtTime(d.ts)}</span></div>` : ""}
        <div class="msg-bubble ${isOwn ? "own" : ""}">
          ${escHtml(d.text || "")} ${edited}
          ${(canEdit || canDelete) ? `
            <div class="msg-actions">
              ${canEdit ? `<button type="button" class="msg-act-btn" onclick="startInlineEdit('${item.id}')"><i class="fas fa-pen"></i></button>` : ""}
              ${canDelete ? `<button type="button" class="msg-act-btn danger" onclick="deleteMsg('${item.id}')"><i class="fas fa-trash"></i></button>` : ""}
            </div>
          ` : ""}

          ${editingMessageId === item.id ? `
            <div class="msg-edit-wrap">
              <input id="edit-input-${item.id}" class="msg-edit-input" value="${escAttr(d.text || "")}" onkeydown="handleInlineEditKey(event,'${item.id}')">
              <button type="button" class="btn-glass btn-glass-sm" onclick="saveInlineEdit('${item.id}')"><i class="fas fa-check"></i></button>
              <button type="button" class="btn-glass btn-glass-sm btn-glass-red" onclick="cancelInlineEdit()"><i class="fas fa-times"></i></button>
            </div>
          ` : ""}
        </div>
      </div>
    `;

    lastAuthor = d.uid;
    lastDate = msgDate;
  });

  box.scrollTop = box.scrollHeight;
}

onSnapshot(query(collection(db,"messages"), orderBy("ts")), (snap)=>{
  messagesCache = snap.docs.map(d=>({id:d.id,data:d.data()}));
  renderChatMessages();
});

window.handleChatKeydown = (event)=>{
  if (event.key==="Enter" && !event.shiftKey){
    event.preventDefault();
    sendMessage();
  }
};

window.handleInlineEditKey = (event,id)=>{
  if (event.key==="Enter"){ event.preventDefault(); saveInlineEdit(id); }
  if (event.key==="Escape"){ event.preventDefault(); cancelInlineEdit(); }
};

window.sendMessage = async ()=>{
  if (!user) return showToast("Önce giriş yapmalısın.", true);
  if (isSendingMessage) return;

  const input = document.getElementById("chat-input");
  const btn = document.getElementById("send-btn");
  const text = input.value.trim();
  if (!text) return;

  isSendingMessage = true;
  btn.disabled = true;

  try{
    const me = await getDoc(doc(db,"users",user.id));
    if (!me.exists()) return showToast("Oturum geçersiz.", true);
    const md = me.data();
    if (isMutedNow(md)) return showToast("Susturuldunuz.", true);

    await addDoc(collection(db,"messages"), {
      uid:user.id, nick:user.nick, role:user.role, text,
      editedAt:null, ts:serverTimestamp()
    });

    input.value = "";
  }catch(e){
    showToast("Mesaj gönderilemedi: " + e.message, true);
  }finally{
    setTimeout(()=>{isSendingMessage=false;btn.disabled=false;},250);
  }
};

window.startInlineEdit = (id)=>{
  editingMessageId = id;
  renderChatMessages();
  setTimeout(()=>{
    const el = document.getElementById(`edit-input-${id}`);
    if (el){ el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  },30);
};

window.cancelInlineEdit = ()=>{
  editingMessageId = null;
  renderChatMessages();
};

window.saveInlineEdit = async (id)=>{
  const ref = doc(db,"messages",id);
  const snap = await getDoc(ref);
  if (!snap.exists()) return;
  const d = snap.data();

  if (d.uid !== user?.id && user?.role !== "admin") return showToast("Bu mesajı düzenleyemezsin.", true);

  const input = document.getElementById(`edit-input-${id}`);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return showToast("Mesaj boş olamaz.", true);

  await updateDoc(ref, { text, editedAt:new Date().toISOString() });
  editingMessageId = null;
  renderChatMessages();
  showToast("Mesaj güncellendi.");
};

window.deleteMsg = async (id)=>{
  const ref = doc(db,"messages",id);
  const snap = await getDoc(ref);
  if (!snap.exists()) return;
  const d = snap.data();
  if (d.uid !== user?.id && user?.role !== "admin") return showToast("Bu mesajı silemezsin.", true);

  await deleteDoc(ref);
  if (editingMessageId === id) editingMessageId = null;
  showToast("Mesaj silindi.");
};

window.updRole = async (id, roleKey)=>{
  if (user?.role !== "admin") return showToast("Sadece admin değiştirebilir.", true);
  if (!rolesMap[roleKey]) return showToast("Geçersiz rol.", true);
  await updateDoc(doc(db,"users",id), { role:roleKey });
  showToast("Rol güncellendi.");
};

window.createRole = async ()=>{
  if (user?.role !== "admin") return showToast("Sadece admin rol oluşturabilir.", true);
  const key = document.getElementById("new-role-key").value.trim().toLowerCase();
  const name = document.getElementById("new-role-name").value.trim();
  const color = document.getElementById("new-role-color").value || "#a8d8ea";
  const canModerate = document.getElementById("new-role-moderate").checked;

  if (!key || !name) return showToast("Rol key ve adı zorunlu.", true);
  if (!/^[a-z0-9_-]+$/.test(key)) return showToast("Rol key sadece a-z 0-9 _ - içerebilir.", true);
  if (key === "admin") return showToast("admin rolü oluşturulamaz.", true);

  await setDoc(doc(db,"roles",key), {
    name,color,className:"",canModerate,canCreateRole:false,archived:false
  }, { merge:true });

  document.getElementById("new-role-key").value = "";
  document.getElementById("new-role-name").value = "";
  document.getElementById("new-role-color").value = "#a8d8ea";
  document.getElementById("new-role-moderate").checked = false;
  showToast("Yeni rol oluşturuldu.");
};

async function ensureFallbackRole(){
  if (rolesMap["sturgiyali"]) return "sturgiyali";
  const nonAdmin = Object.keys(rolesMap).find(k=>k!=="admin");
  if (nonAdmin) return nonAdmin;

  const key = "uyeler";
  await setDoc(doc(db,"roles",key), {
    name:"Üyeler",color:"#8fb0d0",canModerate:false,canCreateRole:false,archived:false
  }, { merge:true });
  rolesMap[key] = {name:"Üyeler",color:"#8fb0d0"};
  return key;
}

window.deleteRole = async (event, roleKey)=>{
  event?.preventDefault();
  event?.stopPropagation();

  if (user?.role !== "admin") return showToast("Sadece admin rol silebilir.", true);
  if (roleKey === "admin") return showToast("admin rolü silinemez.", true);

  if (!confirm(`"${roleKey}" rolünü silmek istediğine emin misin?`)) return;

  try{
    const fallbackRole = await ensureFallbackRole();
    const usersWithRole = await getDocs(query(collection(db,"users"), where("role","==",roleKey)));
    await Promise.all(usersWithRole.docs.map(u => updateDoc(doc(db,"users",u.id), { role:fallbackRole })));

    await deleteDoc(doc(db,"roles",roleKey));
    delete rolesMap[roleKey];
    renderRolesPreview();

    if (user?.role === roleKey){
      user.role = fallbackRole;
      localStorage.setItem("st_session", JSON.stringify(user));
      document.getElementById("display-rank").innerText = rolesMap[fallbackRole]?.name || fallbackRole;
    }

    showToast(`"${roleKey}" rolü silindi.`);
  }catch(err){
    try{
      await updateDoc(doc(db,"roles",roleKey), {
        archived:true,
        deletedAt:new Date().toISOString(),
        deletedBy:user?.id || null
      });
      delete rolesMap[roleKey];
      renderRolesPreview();
      showToast(`"${roleKey}" rolü arşivlendi (soft delete).`);
    }catch{
      showToast("Rol silinemedi: Firestore yetki kuralı engelliyor.", true);
    }
  }
};

window.processAuth = async ()=>{
  const n = document.getElementById("login-nick").value.trim();
  const p = document.getElementById("login-pass").value;
  const errEl = document.getElementById("modal-error");
  const btn = document.getElementById("login-btn");
  errEl.style.display = "none";

  if (!n || !p){ errEl.textContent = "Tüm alanları doldur."; errEl.style.display = "block"; return; }
  if (n.length < 2){ errEl.textContent = "Kullanıcı adı en az 2 karakter olmalı."; errEl.style.display = "block"; return; }
  if (p.length < 4){ errEl.textContent = "Şifre en az 4 karakter olmalı."; errEl.style.display = "block"; return; }

  btn.disabled = true;
  btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Kontrol ediliyor...`;

  try{
    const qUsers = query(collection(db,"users"), where("nick","==",n));
    const snap = await getDocs(qUsers);
    let d;

    if (snap.empty){
      const { hash, salt } = await hashPassword(p);
      const res = await addDoc(collection(db,"users"), {
        nick:n, passHash:hash, passSalt:salt,
        role:"sturgiyali", approved:false, muteUntil:null, muteReason:null
      });
      d = { id:res.id, nick:n, role:"sturgiyali", approved:false };
      showToast("Hesap oluşturuldu, admin onayı bekliyor.");
    }else{
      const docData = snap.docs[0].data();
      let ok = false;

      if (docData.passHash && docData.passSalt){
        ok = await verifyPassword(p, docData.passHash, docData.passSalt);
      }else if (docData.pass){
        ok = (docData.pass === p);
      }

      if (!ok){ errEl.textContent = "Yanlış şifre."; errEl.style.display = "block"; return; }

      if (docData.approved === undefined){
        await updateDoc(doc(db,"users",snap.docs[0].id), { approved:true });
        docData.approved = true;
      }

      d = { id:snap.docs[0].id, ...docData };
      showToast("Hoş geldin, " + d.nick + "!");
    }

    localStorage.setItem("st_session", JSON.stringify(d));
    setTimeout(()=>location.reload(), 700);
  }catch(e){
    errEl.textContent = "Hata: " + e.message;
    errEl.style.display = "block";
  }finally{
    btn.disabled = false;
    btn.innerHTML = `<i class="fas fa-sign-in-alt"></i>Devam Et`;
  }
};

window.updatePassword = async ()=>{
  if (!user) return showToast("Önce giriş yap.", true);
  const current = document.getElementById("current-password").value;
  const np = document.getElementById("new-password").value;
  if (!current) return showToast("Mevcut şifreni gir.", true);
  if (!np || np.length < 6) return showToast("Yeni şifre en az 6 karakter olmalı.", true);

  const me = await getDoc(doc(db,"users",user.id));
  const d = me.data();
  let ok = false;
  if (d.passHash && d.passSalt) ok = await verifyPassword(current, d.passHash, d.passSalt);
  else if (d.pass) ok = (d.pass === current);
  if (!ok) return showToast("Mevcut şifre yanlış.", true);

  const { hash, salt } = await hashPassword(np);
  await updateDoc(doc(db,"users",user.id), { passHash:hash, passSalt:salt, pass:null });

  showToast("Şifre güncellendi.");
  document.getElementById("current-password").value = "";
  document.getElementById("new-password").value = "";
  document.getElementById("strength-bar").style.width = "0";
  document.getElementById("strength-text").textContent = "";
};

if (user){
  document.getElementById("auth-section")?.classList.add("d-none");
  document.getElementById("user-section")?.classList.remove("d-none");
  document.getElementById("display-nick").innerText = user.nick;
  document.getElementById("display-rank").innerText = roleDisplay(user.role).name;
  document.getElementById("hero-rank").innerText = roleDisplay(user.role).name;
  if (user.role === "admin") document.getElementById("admin-nav-item").classList.remove("d-none");
}
renderRolesPreview();

  localStorage.removeItem("st_session");
  location.reload();
};

window.closeModal = ()=> document.getElementById("loginModal").classList.remove("open");
window.closeMuteModal = ()=> document.getElementById("muteModal").classList.remove("open");

window.handleDragLeave = ()=>document.getElementById("upload-zone")?.classList.remove("dragover");
window.handleDrop = (e)=>{e.preventDefault();document.getElementById("upload-zone")?.classList.remove("dragover");};

  <script>
    // Three.js: round glowing particles
    (function() {
      const canvas = document.getElementById("bg-canvas");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x000000, 0);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
      camera.position.z = 5;

      const particleCount = 1700;
      const positions = new Float32Array(particleCount * 3);
      const colors = new Float32Array(particleCount * 3);

      const palette = [
        new THREE.Color(0x8fe9ff),
        new THREE.Color(0x7aa8ff),
        new THREE.Color(0x6d5bff),
        new THREE.Color(0x79ffd4),
        new THREE.Color(0xf0d070)
      ];

      for (let i = 0; i < particleCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 34;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 24;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 16;

        const c = palette[Math.floor(Math.random() * palette.length)];
        colors[i * 3] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;
      }

      const geom = new THREE.BufferGeometry();
      geom.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geom.setAttribute("color", new THREE.BufferAttribute(colors, 3));

      function createCircleTexture() {
        const size = 128;
        const c = document.createElement("canvas");
        c.width = size; c.height = size;
        const ctx = c.getContext("2d");
        const g = ctx.createRadialGradient(size/2, size/2, 4, size/2, size/2, size/2);
        g.addColorStop(0, "rgba(255,255,255,1)");
        g.addColorStop(0.2, "rgba(255,255,255,0.9)");
        g.addColorStop(0.55, "rgba(255,255,255,0.35)");
        g.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = g;
        ctx.fillRect(0,0,size,size);
        const tex = new THREE.CanvasTexture(c);
        tex.needsUpdate = true;
        return tex;
      }

      const mat = new THREE.PointsMaterial({
        size:0.06,
        transparent:true,
        opacity:0.7,
        vertexColors:true,
        blending:THREE.AdditiveBlending,
        depthWrite:false,
        map:createCircleTexture(),
        alphaTest:0.02
      });

      const particles = new THREE.Points(geom, mat);
      scene.add(particles);

      let mouseX = 0, mouseY = 0;
      document.addEventListener("mousemove", (e) => {
        mouseX = (e.clientX / window.innerWidth - 0.5) * 0.7;
        mouseY = (e.clientY / window.innerHeight - 0.5) * 0.45;

        document.body.style.setProperty("--mx", `${(e.clientX / window.innerWidth) * 100}%`);
        document.body.style.setProperty("--my", `${(e.clientY / window.innerHeight) * 100}%`);
      });

      let t = 0;
      function animate() {
        requestAnimationFrame(animate);
        t += 0.005;

        particles.rotation.y = t * 0.06;
        particles.rotation.x = t * 0.02;
        particles.material.opacity = 0.62 + Math.sin(t * 1.8) * 0.12;

        camera.position.x += (mouseX - camera.position.x) * 0.05;
        camera.position.y += (-mouseY - camera.position.y) * 0.05;
        camera.lookAt(scene.position);

        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    })();

    window.toggleSidebar = () => {
      document.getElementById("sidenav").classList.toggle("open");
      document.getElementById("sidenav-overlay").classList.toggle("open");
    };
    window.closeSidebar = () => {
      document.getElementById("sidenav").classList.remove("open");
      document.getElementById("sidenav-overlay").classList.remove("open");
    };
  </script>
