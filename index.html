<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
    <title>Sturgia Clan | Elite Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050608; font-family: 'Rajdhani', sans-serif; color: #d4dce8; }
        .sidenav { position: fixed; left: 0; top: 0; width: 260px; height: 100vh; background: #0f1118; border-right: 1px solid rgba(255,255,255,0.06); z-index: 100; overflow-y: auto; }
        .main-content { margin-left: 260px; min-height: 100vh; }
        .clan-brand { padding: 28px 24px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .clan-name { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 900; letter-spacing: 6px; color: #e8c96a; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 11px 16px; color: #8096b0; text-decoration: none; font-size: 13px; font-weight: 600; letter-spacing: 1.5px; border-radius: 8px; margin: 4px 12px; }
        .nav-link:hover { background: rgba(168,216,234,0.08); color: #c9e8f4; }
        .nav-link.active { background: rgba(168,216,234,0.1); color: #a8d8ea; }
        .btn-login { width: calc(100% - 24px); margin: 12px; padding: 12px; background: transparent; border: 1px solid rgba(168,216,234,0.3); border-radius: 8px; color: #a8d8ea; cursor: pointer; }
        .btn-logout { width: calc(100% - 24px); margin: 8px 12px; padding: 10px; background: transparent; border: 1px solid rgba(192,57,43,0.4); border-radius: 6px; color: #e57373; cursor: pointer; }
        .page-body { padding: 40px 48px; }
        .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
        .section-title { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; color: #fff; }
        .warrior-card { background: #13161e; border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 18px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .badge-rank { font-size: 10px; padding: 4px 10px; border-radius: 4px; }
        .rank-admin { background: rgba(192,57,43,0.2); color: #e57373; }
        .rank-pending { background: rgba(243,156,18,0.2); color: #f39c12; }
        .chat-wrapper { display: grid; grid-template-columns: 1fr 280px; gap: 20px; height: calc(100vh - 200px); }
        .chat-main { background: #13161e; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; }
        .chat-input-area { padding: 12px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; gap: 10px; }
        .chat-input { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 10px; color: #fff; }
        .forum-post-card { background: #13161e; border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 20px; margin-bottom: 16px; cursor: pointer; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .gallery-card { background: #13161e; border-radius: 12px; overflow: hidden; }
        .gallery-card img { width: 100%; height: 180px; object-fit: cover; }
        .access-denied { text-align: center; padding: 80px 20px; color: #5a6a7e; }
        .access-denied i { font-size: 64px; margin-bottom: 20px; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: #0f1118; border: 1px solid rgba(168,216,234,0.1); border-radius: 16px; padding: 40px; width: 90%; max-width: 400px; }
        .toast-msg { position: fixed; bottom: 20px; right: 20px; background: #13161e; border: 1px solid rgba(168,216,234,0.2); border-radius: 8px; padding: 12px 20px; transform: translateX(120%); transition: 0.3s; z-index: 2000; }
        .toast-msg.show { transform: translateX(0); }
        .form-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 12px; color: #fff; margin-bottom: 16px; }
        .btn-action { padding: 12px 24px; background: rgba(168,216,234,0.1); border: 1px solid rgba(168,216,234,0.25); border-radius: 8px; color: #a8d8ea; cursor: pointer; }
        @media (max-width: 768px) {
            .sidenav { transform: translateX(-100%); transition: 0.3s; }
            .main-content { margin-left: 0; }
            .page-body { padding: 20px; }
            .chat-wrapper { grid-template-columns: 1fr; }
        }
        .d-none { display: none !important; }
        .row { display: flex; flex-wrap: wrap; gap: 16px; }
        .col-md-4 { flex: 0 0 calc(33.333% - 16px); }
        @media (max-width: 768px) { .col-md-4 { flex: 0 0 100%; } }
    </style>
</head>
<body>
    <nav class="sidenav" id="sidenav">
    <div class="clan-brand">
        <div class="clan-name">STURGIA</div>
        <div style="font-size: 10px; letter-spacing: 2px; color: #5a6a7e;">ELITE CLAN</div>
    </div>
    <div style="margin-top: 20px;">
        <a href="#" onclick="showPage('home')" class="nav-link active" id="nav-home"><i class="fas fa-compass"></i> Anasayfa</a>
        <a href="#" onclick="showPage('warriors')" class="nav-link" id="nav-warriors"><i class="fas fa-users"></i> Savaşçılar</a>
        <a href="#" onclick="showPage('chat')" class="nav-link" id="nav-chat"><i class="fas fa-comments"></i> Sohbet</a>
        <a href="#" onclick="showPage('forum')" class="nav-link" id="nav-forum"><i class="fas fa-scroll"></i> Forum</a>
        <a href="#" onclick="showPage('gallery')" class="nav-link" id="nav-gallery"><i class="fas fa-images"></i> Galeri</a>
        <a href="#" onclick="showPage('discord')" class="nav-link" id="nav-discord"><i class="fab fa-discord"></i> Discord</a>
        <a href="#" onclick="showPage('settings')" class="nav-link" id="nav-settings"><i class="fas fa-shield-alt"></i> Ayarlar</a>
        <div id="adminNav" class="d-none">
            <a href="#" onclick="showPage('admin')" class="nav-link" id="nav-admin"><i class="fas fa-crown"></i> Admin Panel</a>
        </div>
    </div>
    <div style="margin-top: auto; padding: 20px;">
        <div id="authBox">
            <button onclick="openLoginModal()" class="btn-login"><i class="fas fa-sign-in-alt"></i> Giriş Yap</button>
        </div>
        <div id="userBox" class="d-none">
            <div style="text-align: center; margin-bottom: 8px;" id="userNick"></div>
            <div style="text-align: center; font-size: 11px; color: #5a6a7e;" id="userRole"></div>
            <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Çıkış</button>
        </div>
    </div>
</nav>

<main class="main-content">
    <section id="page-home"><div class="page-body"><div class="section-header"><div class="section-title">Hoş Geldin Savaşçı</div><div class="section-rule"></div></div><p style="color:#8096b0">Sturgia klanının resmi kontrol paneli.</p><div id="stats" style="margin-top: 30px; display: flex; gap: 20px; flex-wrap: wrap;"><div style="background:#13161e; padding:20px; border-radius:12px; flex:1"><div style="font-size:11px; color:#5a6a7e">Toplam Üye</div><div style="font-size:36px; font-weight:900" id="totalUsers">0</div></div></div></div></section>
    <section id="page-warriors" class="d-none"><div class="page-body"><div class="section-header"><div class="section-title">Savaşçılar</div><div class="section-rule"></div></div><div id="warriorsList" class="row"></div></div></section>
    <section id="page-chat" class="d-none"><div class="page-body"><div class="section-header"><div class="section-title">Klan Sohbeti</div><div class="section-rule"></div></div><div id="chatContainer"></div></div></section>
    <section id="page-forum" class="d-none"><div class="page-body"><div class="section-header"><div class="section-title">Forum</div><div class="section-rule"></div></div><div id="forumContainer"></div></div></section>
    <section id="page-gallery" class="d-none"><div class="page-body"><div class="section-header"><div class="section-title">Galeri</div><div class="section-rule"></div></div><div id="galleryContainer"></div></div></section>
    <section id="page-discord" class="d-none"><div class="page-body"><div class="section-header"><div class="section-title">Discord</div><div class="section-rule"></div></div><div style="text-align:center; padding:60px; background:#13161e; border-radius:16px"><i class="fab fa-discord" style="font-size:64px; color:#7289da"></i><h3 style="margin:20px 0">Sturgia Discord</h3><a href="https://discord.gg/sturgia" target="_blank" style="background:#7289da; color:white; padding:12px 30px; border-radius:8px; text-decoration:none">Katıl</a></div></div></section>
    <section id="page-settings" class="d-none"><div class="page-body"><div class="section-header"><div class="section-title">Ayarlar</div><div class="section-rule"></div></div><div style="background:#13161e; padding:30px; border-radius:12px; max-width:400px"><label>Yeni Şifre</label><input type="password" id="newPassword" class="form-input" placeholder="••••••"><button onclick="changePassword()" class="btn-action">Güncelle</button></div></div></section>
    <section id="page-admin" class="d-none"><div class="page-body"><div class="section-header"><div class="section-title">Admin Paneli</div><div class="section-rule"></div></div><div style="display:flex; gap:10px; margin-bottom:20px"><button onclick="showAdminTab('approved')" id="tabApprovedBtn" class="btn-action">Onaylılar</button><button onclick="showAdminTab('pending')" id="tabPendingBtn" class="btn-action">Bekleyenler</button></div><div id="adminApprovedList"></div><div id="adminPendingList" style="display:none"></div></div></section>
</main>

<div class="modal-overlay" id="loginModal" onclick="if(event.target===this)closeLoginModal()"><div class="modal-box"><button onclick="closeLoginModal()" style="float:right; background:none; border:none; color:#fff; font-size:20px; cursor:pointer">✕</button><h3 style="text-align:center; margin-bottom:20px">Giriş Yap</h3><input type="text" id="loginNick" class="form-input" placeholder="Kullanıcı Adı"><input type="password" id="loginPass" class="form-input" placeholder="Şifre" onkeypress="if(event.key==='Enter')doLogin()"><button onclick="doLogin()" class="btn-action" style="width:100%">Giriş</button></div></div>

<div class="toast-msg" id="toast"><i class="fas fa-check-circle"></i> <span id="toastText"></span></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, addDoc, updateDoc, deleteDoc, doc, orderBy, serverTimestamp, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDKd2xNlNn9pi6foaLGix8MOSasqehoS_U",
    authDomain: "sturgia-clan.firebaseapp.com",
    projectId: "sturgia-clan",
    storageBucket: "sturgia-clan.firebasestorage.app",
    messagingSenderId: "257587521790",
    appId: "1:257587521790:web:59b1a1b38029d1564dddaf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = JSON.parse(localStorage.getItem('sturgia_user')) || null;
let allUsers = {};

// HASH FONKSİYONU (şifreleri güvenli yap)
async function hashPassword(pass) {
    const encoder = new TextEncoder();
    const data = encoder.encode(pass);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// GİRİŞ YAP
window.doLogin = async () => {
    const nick = document.getElementById('loginNick').value.trim();
    const pass = document.getElementById('loginPass').value;
    if (!nick || !pass) { showToast('Kullanıcı adı ve şifre girin', true); return; }
    
    const hashedPass = await hashPassword(pass);
    const q = query(collection(db, "users"), where("nick", "==", nick));
    const snap = await getDocs(q);
    
    if (snap.empty) {
        // Yeni kayıt - onay bekliyor olarak ekle
        const newUser = await addDoc(collection(db, "users"), {
            nick: nick,
            pass: hashedPass,
            role: "pending",
            muteUntil: null,
            createdAt: serverTimestamp()
        });
        currentUser = { id: newUser.id, nick: nick, role: "pending" };
        localStorage.setItem('sturgia_user', JSON.stringify(currentUser));
        showToast('Kayıt başarılı! Admin onayı bekleniyor.');
        setTimeout(() => location.reload(), 1500);
    } else {
        const userDoc = snap.docs[0];
        const userData = userDoc.data();
        if (userData.pass !== hashedPass) {
            showToast('Şifre yanlış!', true);
            return;
        }
        currentUser = { id: userDoc.id, nick: userData.nick, role: userData.role };
        localStorage.setItem('sturgia_user', JSON.stringify(currentUser));
        showToast('Hoş geldin ' + nick);
        setTimeout(() => location.reload(), 1000);
    }
    closeLoginModal();
};

window.logout = () => {
    localStorage.removeItem('sturgia_user');
    location.reload();
};

// ONLİSTENLER
onSnapshot(collection(db, "users"), (snap) => {
    allUsers = {};
    snap.forEach(doc => { allUsers[doc.id] = { id: doc.id, ...doc.data() }; });
    document.getElementById('totalUsers').innerText = snap.size;
    renderWarriors();
    if (currentUser?.role === 'admin') renderAdminPanels();
});

function renderWarriors() {
    const container = document.getElementById('warriorsList');
    if (!container) return;
    container.innerHTML = '';
    Object.values(allUsers).forEach(u => {
        const roleClass = u.role === 'admin' ? 'rank-admin' : (u.role === 'pending' ? 'rank-pending' : '');
        container.innerHTML += `<div class="col-md-4"><div class="warrior-card"><span>${escapeHtml(u.nick)}</span><span class="badge-rank ${roleClass}">${u.role === 'admin' ? 'Yönetici' : (u.role === 'pending' ? 'Onay Bekliyor' : 'Savaşçı')}</span></div></div>`;
    });
}

function renderAdminPanels() {
    const approvedContainer = document.getElementById('adminApprovedList');
    const pendingContainer = document.getElementById('adminPendingList');
    if (!approvedContainer) return;
    
    const approved = Object.values(allUsers).filter(u => u.role !== 'pending');
    const pending = Object.values(allUsers).filter(u => u.role === 'pending');
    
    approvedContainer.innerHTML = `<table style="width:100%"><tr><th>Kullanıcı</th><th>Rütbe</th><th>İşlem</th></tr>${approved.map(u => `<tr><td>${escapeHtml(u.nick)}</td><td><select onchange="updateRole('${u.id}', this.value)" class="form-input" style="width:auto; padding:5px"><option value="sturgiyali" ${u.role==='sturgiyali'?'selected':''}>Savaşçı</option><option value="westra" ${u.role==='westra'?'selected':''}>Westra</option><option value="admin" ${u.role==='admin'?'selected':''}>Admin</option></select></td><td><button onclick="muteUser('${u.id}')" class="btn-action" style="padding:5px 10px; font-size:11px">Mute</button></td></tr>`).join('')}</table>`;
    
    pendingContainer.innerHTML = `<table style="width:100%"><tr><th>Kullanıcı</th><th>Durum</th><th>İşlem</th></tr>${pending.map(u => `<tr><td>${escapeHtml(u.nick)}</td><td>⏳ Bekliyor</td><td><button onclick="approveUser('${u.id}')" style="background:#4caf7d; border:none; color:white; padding:5px 15px; border-radius:5px; cursor:pointer">Onayla</button></td></tr>`).join('')}</table>`;
    if(pending.length===0) pendingContainer.innerHTML = '<p style="color:#5a6a7e">Bekleyen üye yok</p>';
}

window.approveUser = async (id) => {
    await updateDoc(doc(db, "users", id), { role: "sturgiyali" });
    showToast('Üye onaylandı!');
};

window.updateRole = async (id, role) => {
    await updateDoc(doc(db, "users", id), { role: role });
    showToast('Rütbe güncellendi');
};

window.muteUser = async (id) => {
    const until = new Date();
    until.setHours(until.getHours() + 1);
    await updateDoc(doc(db, "users", id), { muteUntil: until.toISOString() });
    showToast('1 saat susturuldu');
};

window.changePassword = async () => {
    const newPass = document.getElementById('newPassword').value;
    if (!newPass || newPass.length < 3) { showToast('Şifre en az 3 karakter', true); return; }
    const hashed = await hashPassword(newPass);
    await updateDoc(doc(db, "users", currentUser.id), { pass: hashed });
    showToast('Şifre değişti');
};

// CHAT
function loadChat() {
    const container = document.getElementById('chatContainer');
    if (!currentUser) { container.innerHTML = accessDeniedHtml('Giriş yapmalısın'); return; }
    if (currentUser.role === 'pending') { container.innerHTML = accessDeniedHtml('Admin onayı bekleniyor'); return; }
    
    container.innerHTML = `<div class="chat-wrapper"><div class="chat-main"><div class="chat-messages" id="chatMsgs"></div><div class="chat-input-area"><input type="text" id="chatInput" class="chat-input" placeholder="Mesaj..." onkeypress="if(event.key==='Enter')sendMsg()"><button onclick="sendMsg()" class="chat-send-btn">Gönder</button></div></div><div class="chat-sidebar" style="background:#13161e; border-radius:12px; padding:16px"><h4>Üyeler</h4><div id="chatMembers"></div></div></div>`;
    
    onSnapshot(query(collection(db, "messages"), orderBy("ts")), (snap) => {
        const msgsDiv = document.getElementById('chatMsgs');
        if(!msgsDiv) return;
        msgsDiv.innerHTML = '';
        snap.forEach(d => {
            const data = d.data();
            msgsDiv.innerHTML += `<div style="margin-bottom:12px"><b style="color:#a8d8ea">${escapeHtml(data.nick)}</b><div style="background:rgba(255,255,255,0.03); padding:8px 12px; border-radius:8px; margin-top:4px">${escapeHtml(data.text)}</div></div>`;
        });
        msgsDiv.scrollTop = msgsDiv.scrollHeight;
    });
    
    onSnapshot(collection(db, "users"), (snap) => {
        const membersDiv = document.getElementById('chatMembers');
        if(!membersDiv) return;
        membersDiv.innerHTML = '';
        snap.forEach(d => {
            const data = d.data();
            membersDiv.innerHTML += `<div style="padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.05)">${escapeHtml(data.nick)}</div>`;
        });
    });
}

window.sendMsg = async () => {
    if (!currentUser || currentUser.role === 'pending') { showToast('Yetkin yok', true); return; }
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    await addDoc(collection(db, "messages"), { uid: currentUser.id, nick: currentUser.nick, role: currentUser.role, text: text, ts: serverTimestamp() });
    input.value = '';
};

// FORUM
let forumPosts = [];
function loadForum() {
    const container = document.getElementById('forumContainer');
    if (!currentUser) { container.innerHTML = accessDeniedHtml('Giriş yapmalısın'); return; }
    if (currentUser.role === 'pending') { container.innerHTML = accessDeniedHtml('Admin onayı bekleniyor'); return; }
    
    container.innerHTML = `<div><button onclick="showNewPostForm()" class="btn-action" style="margin-bottom:20px">+ Yeni Konu</button><div id="newPostForm" class="d-none" style="background:#13161e; padding:20px; border-radius:12px; margin-bottom:20px"><input type="text" id="postTitle" class="form-input" placeholder="Başlık"><textarea id="postBody" class="form-input" placeholder="İçerik" rows="4"></textarea><button onclick="submitPost()" class="btn-action">Gönder</button> <button onclick="hideNewPostForm()" class="btn-action" style="background:transparent">İptal</button></div><div id="forumList"></div></div>`;
    loadForumList();
}

async function loadForumList() {
    const q = query(collection(db, "forum_posts"), orderBy("ts", "desc"));
    const snap = await getDocs(q);
    forumPosts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const listDiv = document.getElementById('forumList');
    if(!listDiv) return;
    listDiv.innerHTML = forumPosts.map(p => `<div class="forum-post-card" onclick="openPost('${p.id}')"><h4>${escapeHtml(p.title)}</h4><p style="color:#8096b0">${escapeHtml(p.body).substring(0,100)}...</p><small>${escapeHtml(p.nick)}</small></div>`).join('');
}

window.submitPost = async () => {
    const title = document.getElementById('postTitle').value.trim();
    const body = document.getElementById('postBody').value.trim();
    if(!title || !body) { showToast('Başlık ve içerik girin', true); return; }
    await addDoc(collection(db, "forum_posts"), { title, body, nick: currentUser.nick, uid: currentUser.id, replyCount: 0, ts: serverTimestamp() });
    showToast('Konu açıldı');
    location.reload();
};

// GALERİ
function loadGallery() {
    onSnapshot(collection(db, "gallery"), (snap) => {
        const container = document.getElementById('galleryContainer');
        if(!container) return;
        const images = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        let html = `<div class="gallery-grid">`;
        images.forEach(img => { html += `<div class="gallery-card"><img src="${escapeHtml(img.url)}" onerror="this.src='https://via.placeholder.com/300?text=Hata'"><div style="padding:12px"><small>${img.ts ? new Date(img.ts.toDate()).toLocaleDateString() : ''}</small>${currentUser?.role === 'admin' ? `<button onclick="deleteImage('${img.id}')" class="btn-action" style="margin-top:8px; padding:4px 12px">Sil</button>` : ''}</div></div>`; });
        html += `</div>`;
        if(currentUser?.role === 'admin') html += `<button onclick="addImage()" class="btn-action" style="margin-top:20px">+ Fotoğraf Ekle</button>`;
        container.innerHTML = html;
    });
}

window.addImage = async () => {
    const url = prompt('Fotoğraf URL girin:');
    if(url) await addDoc(collection(db, "gallery"), { url, ts: serverTimestamp() });
};

window.deleteImage = async (id) => {
    await deleteDoc(doc(db, "gallery", id));
    showToast('Silindi');
};

// SAYFA GEÇİŞLERİ
window.showPage = (page) => {
    document.querySelectorAll('section').forEach(s => s.classList.add('d-none'));
    document.getElementById(`page-${page}`).classList.remove('d-none');
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    const activeLink = document.getElementById(`nav-${page}`);
    if(activeLink) activeLink.classList.add('active');
    
    if(page === 'chat') loadChat();
    if(page === 'forum') loadForum();
    if(page === 'gallery') loadGallery();
    if(page === 'admin' && currentUser?.role !== 'admin') showPage('home');
};

window.showAdminTab = (tab) => {
    document.getElementById('adminApprovedList').style.display = tab === 'approved' ? 'block' : 'none';
    document.getElementById('adminPendingList').style.display = tab === 'pending' ? 'block' : 'none';
};

window.openLoginModal = () => { document.getElementById('loginModal').classList.add('open'); };
window.closeLoginModal = () => { document.getElementById('loginModal').classList.remove('open'); };

function accessDeniedHtml(msg) { return `<div class="access-denied"><i class="fas fa-lock"></i><h3>Erişim Engellendi</h3><p>${msg}</p><button onclick="openLoginModal()" class="btn-action">Giriş Yap</button></div>`; }
function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
function showToast(msg, isError=false) { const t = document.getElementById('toast'); document.getElementById('toastText').innerText = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }

// SESSION KONTROL
if(currentUser) {
    document.getElementById('authBox').classList.add('d-none');
    document.getElementById('userBox').classList.remove('d-none');
    document.getElementById('userNick').innerText = currentUser.nick;
    document.getElementById('userRole').innerText = currentUser.role === 'admin' ? 'Yönetici' : (currentUser.role === 'pending' ? 'Onay Bekliyor' : 'Savaşçı');
    if(currentUser.role === 'admin') document.getElementById('adminNav').classList.remove('d-none');
    document.getElementById('hero-rank').innerText = currentUser.role === 'admin' ? 'Yönetici' : (currentUser.role === 'pending' ? 'Onay Bekliyor' : 'Savaşçı');
}

// Mobil için sidebar toggle (isteğe bağlı)
let sidebarOpen = false;
function toggleSidebar() { const s = document.getElementById('sidenav'); s.style.transform = sidebarOpen ? 'translateX(-100%)' : 'translateX(0)'; sidebarOpen = !sidebarOpen; }

window.showToast = showToast;
window.escapeHtml = escapeHtml;
</script>
</body>
</html>
