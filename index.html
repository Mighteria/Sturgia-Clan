<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sturgia Clan | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Lexend:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #ffffff;
            --secondary-bg: #111111;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--accent-color);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Sinematik Arka Plan Işığı */
        .spotlight {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 80%);
            pointer-events: none;
            z-index: 0;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 10%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Lexend', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            /* Neon ışık efekti kaldırıldı, temiz ve şık duruyor */
            color: var(--accent-color);
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-family: 'Lexend', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 300;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeIn 1.5s forwards;
        }

        /* Role Management Section */
        .management-container {
            max-width: 1000px;
            margin: 100px auto;
            padding: 40px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        input:focus {
            border-color: rgba(255,255,255,0.4);
        }

        button {
            background: var(--accent-color);
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        button:hover {
            transform: scale(1.05);
            background: #e0e0e0;
        }

        /* Role List Grid */
        #roleList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .role-card {
            background: var(--secondary-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: cardIn 0.5s ease-out forwards;
        }

        .delete-btn {
            background: transparent;
            color: #ff4444;
            padding: 5px 10px;
            font-size: 0.8rem;
            border: 1px solid #ff4444;
        }

        .delete-btn:hover {
            background: #ff4444;
            color: white;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes cardIn {
            from { opacity: 0; scale: 0.9; }
            to { opacity: 1; scale: 1; }
        }
    </style>
</head>
<body>

    <div class="spotlight"></div>

    <nav>
        <div class="logo">STURGIA</div>
        <div class="nav-links">
            <span>CLAN PORTAL</span>
        </div>
    </nav>

    <section class="hero">
        <h1>THE NEW STANDARD.</h1>
        <p>Experience the power of Sturgia Clan.</p>
    </section>

    <div class="management-container">
        <h2 style="margin-bottom: 20px; font-weight: 300;">Role Management</h2>
        <div class="input-group">
            <input type="text" id="roleInput" placeholder="Enter role name...">
            <button onclick="addRole()">Add Role</button>
        </div>
        <div id="roleList">
            </div>
    </div>

    <script>
        // Sayfa yüklendiğinde rolleri getir
        document.addEventListener('DOMContentLoaded', loadRoles);

        const roleInput = document.getElementById('roleInput');
        const roleList = document.getElementById('roleList');

        function addRole() {
            const roleName = roleInput.value.trim();
            if (roleName === "") return;

            const roles = JSON.parse(localStorage.getItem('sturgia_roles') || '[]');
            roles.push(roleName);
            localStorage.setItem('sturgia_roles', JSON.stringify(roles));

            roleInput.value = "";
            renderRoles();
        }

        function deleteRole(index) {
            const roles = JSON.parse(localStorage.getItem('sturgia_roles') || '[]');
            roles.splice(index, 1);
            localStorage.setItem('sturgia_roles', JSON.stringify(roles));
            renderRoles();
        }

        function loadRoles() {
            renderRoles();
        }

        function renderRoles() {
            const roles = JSON.parse(localStorage.getItem('sturgia_roles') || '[]');
            roleList.innerHTML = roles.map((role, index) => `
                <div class="role-card">
                    <span>${role}</span>
                    <button class="delete-btn" onclick="deleteRole(${index})">Delete</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>v
