<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Sturgia Clan | Premium Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --bg:#020308; /* Daha tünd fon */
  --s1:rgba(255,255,255,.03);--s2:rgba(255,255,255,.06);--s3:rgba(255,255,255,.1);
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.14);--b3:rgba(255,255,255,.24);
  --ice:#7dd3fc;--frost:#e0f2fe;--gold:#f59e0b;--gold2:#fcd34d;
  --red:#ef4444;--green:#22c55e;--purple:#a78bfa;
  --text:#cbd5e1;--muted:#475569;--dim:#1e293b;
  --sw:280px;--r:16px;
  --glow-ice:rgba(125,211,252,.35);
}
*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;overflow-x:hidden;color:var(--text);
  font-family:'Outfit',sans-serif; background:var(--bg);
}

/* Videodakı Neon Atmosferi */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background: 
    radial-gradient(circle at 15% 10%, rgba(125,211,252,0.15), transparent 40%),
    radial-gradient(circle at 85% 85%, rgba(167,139,250,0.1), transparent 40%);
}

#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Premium Glassmorphism */
.glass-premium {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(25px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
}

/* Rol Paneli Yeni Dizayn */
.role-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-radius: 12px;
  background: rgba(255,255,255,0.02); border: 1px solid var(--b1);
  margin-bottom: 8px; transition: 0.3s;
}
.role-row:hover {
  background: rgba(255,255,255,0.05);
  border-color: var(--ice);
  transform: translateX(5px);
}

.btn-premium {
  padding: 10px 20px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, var(--ice), var(--purple));
  color: #000; font-weight: 800; cursor: pointer; transition: 0.3s;
}
.btn-premium:hover {
  box-shadow: 0 0 20px var(--glow-ice);
  transform: translateY(-2px);
}

/* Sidenav */
.sidenav{
  position:fixed;left:0;top:0;z-index:100;width:var(--sw);height:100vh;
  background:rgba(4,5,13,.92); backdrop-filter:blur(40px);
  border-right:1px solid var(--b1);
}
</style>
</head>
<body>

<div id="bg-canvas"></div>

<aside class="sidenav">
  <div class="clan-brand">
    <div class="clan-logo-wrap">
      <i class="fas fa-shield-alt" style="font-size: 40px; color: var(--ice);"></i>
    </div>
    <div class="clan-name">STURGIA CLAN</div>
  </div>
  </aside>

<main class="main-content" style="margin-left: var(--sw); padding: 40px;">
  
  <section id="role-management" class="glass-premium" style="padding: 30px; border-radius: 20px;">
    <h2 style="font-family: 'Orbitron'; color: #fff; margin-bottom: 20px;">
      <i class="fas fa-user-shield"></i> ROL İDARƏETMƏSİ
    </h2>
    
    <div style="display: flex; gap: 10px; margin-bottom: 25px;">
      <input type="text" id="newRoleName" class="glass-premium" style="flex: 1; padding: 12px; border-radius: 10px; color: #fff;" placeholder="Yeni rol adı...">
      <button onclick="addNewRole()" class="btn-premium">ƏLAVƏ ET</button>
    </div>

    <div id="rolesContainer">
      </div>
  </section>

</main>

<script>
// THREE.JS ARXA FON (Videodakı kimi ulduz effekti) [cite: 136]
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('bg-canvas').appendChild(renderer.domElement);

const geometry = new THREE.BufferGeometry();
const vertices = [];
for (let i = 0; i < 5000; i++) {
  vertices.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
}
geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
const particles = new THREE.Points(geometry, new THREE.PointsMaterial({color: 0x7dd3fc, size: 2}));
scene.add(particles);
camera.position.z = 500;

function animate() {
  requestAnimationFrame(animate);
  particles.rotation.x += 0.0005;
  particles.rotation.y += 0.0005;
  renderer.render(scene, camera);
}
animate();

// ROL FUNKSİYALARI (Fix edildi)
let roles = ["Admin", "Moderator", "Üzv"]; // Başlanğıc datası

function renderRoles() {
  const container = document.getElementById('rolesContainer');
  container.innerHTML = roles.map((role, index) => `
    <div class="role-row">
      <span><i class="fas fa-circle" style="font-size: 8px; color: var(--ice); margin-right: 10px;"></i> ${role}</span>
      <button onclick="deleteRole(${index})" style="background: none; border: none; color: var(--red); cursor: pointer;">
        <i class="fas fa-trash-alt"></i>
      </button>
    </div>
  `).join('');
}

function addNewRole() {
  const input = document.getElementById('newRoleName');
  if(input.value.trim() !== "") {
    roles.push(input.value.trim());
    input.value = "";
    renderRoles();
    // Buraya Firebase update kodu əlavə edilə bilər: db.collection('roles').doc('list').update({roles})
  }
}

function deleteRole(index) {
  roles.splice(index, 1);
  renderRoles();
}

// İlkin yükləmə
renderRoles();
</script>

</body>
</html>
